<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<style>*{margin:0;padding:0;box-sizing:border-box;}html,body{background:#080808;overflow-x:hidden;}</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://unpkg.com/lenis/dist/lenis.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;
const BG="#080808",G="#C9A84C",GL="#EDD98A",G2="#C8986A";

const WATCHES=[
  {img:"https://res.cloudinary.com/djzwhvq8s/image/upload/v1778131054/kling_20260507_%E4%BD%9C%E5%93%81_Luxury_pro_3300_1_ykilvz.jpg",accent:"#C9A84C",rgb:"201,168,76",name:"Rolex Day-Date",col:"Presidential Collection",spec:"18K Yellow Gold · President Bracelet · Caliber 3255",ref:"228238",time:"10:10"},
  {img:"https://res.cloudinary.com/djzwhvq8s/image/upload/v1778131024/kling_20260507_%E4%BD%9C%E5%93%81_Luxury_pro_3300_0_1_p3t9j7.jpg",accent:"#C8986A",rgb:"200,152,106",name:"AP Royal Oak",col:"Extra-Thin Rose Gold",spec:"18K Rose Gold · Grande Tapisserie · Caliber 2121",ref:"15202OR",time:"02:00"},
  {img:"https://res.cloudinary.com/djzwhvq8s/image/upload/v1778131060/kling_20260507_%E4%BD%9C%E5%93%81_Luxury_pro_3300_1_1_lssrjs.jpg",accent:"#4A7A9B",rgb:"74,122,155",name:"AP Royal Oak",col:"Offshore Storm",spec:"Black Ceramic · Forged Carbon · Caliber 3126",ref:"26405CE",time:"08:20"}
];

const CATS=[
  {num:"01",name:"Chains",desc:"18K gold-plated Cuban, Figaro, and Rope. 4mm to 12mm. Every length, every occasion.",img:"https://images.unsplash.com/photo-1611652022419-a9419f74343d?w=1400&q=80&fit=crop"},
  {num:"02",name:"Watches",desc:"Presidential. Royal Oak. GMT. Museum-quality movement. Studio-finished dial. Real-world price.",img:"https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=1400&q=80&fit=crop"},
  {num:"03",name:"Rings",desc:"Moissanite pavé. Signet. Bypass. 14K gold fill. Custom stone setting available.",img:"https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=1400&q=80&fit=crop"},
  {num:"04",name:"Custom",desc:"Your vision. Our craftsmanship. Commission from scratch. Starts at $299. Ships in 4–6 weeks.",img:"https://images.unsplash.com/photo-1535632066829-9a41f1a01756?w=1400&q=80&fit=crop"}
];

const TESTIMONIALS=[
  {quote:"I've been to Tiffany's. The difference is I can actually afford to come back to Luxx.",name:"Marcus T.",loc:"Atlanta, GA",photo:"https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=800&q=90&fit=crop&crop=face"},
  {quote:"The chain looks like it costs three times what I paid. People stop me everywhere I go.",name:"Alicia R.",loc:"Houston, TX",photo:"https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=800&q=90&fit=crop&crop=face"},
  {quote:"Bought the GMT for my husband's birthday. He thought I spent way more. That's the whole point.",name:"Jordan M.",loc:"Chicago, IL",photo:"https://images.unsplash.com/photo-1500048993953-d23a436266cf?w=800&q=90&fit=crop&crop=face"}
];

const STATS=[{n:500,s:"+",label:"Pieces Crafted"},{n:4.9,s:"★",label:"Avg Rating",dec:true},{n:10,s:"+",label:"Years of Craft"},{n:100,s:"%",label:"Guaranteed"}];

/* ── HOOKS ─────────────────────────────────────────────── */
function useScrollY(){const[y,setY]=useState(0);useEffect(()=>{const fn=()=>setY(window.scrollY);window.addEventListener("scroll",fn,{passive:true});return()=>window.removeEventListener("scroll",fn);},[]);return y;}
function useBgProgress(){const[p,setP]=useState(0);useEffect(()=>{const fn=()=>{const m=document.documentElement.scrollHeight-window.innerHeight;setP(m>0?Math.max(0,Math.min(1,window.scrollY/m)):0);};window.addEventListener("scroll",fn,{passive:true});fn();return()=>window.removeEventListener("scroll",fn);},[]);return p;}
function useInView(t=0.15){const ref=useRef(null);const[v,setV]=useState(false);useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true);},{threshold:t});if(ref.current)o.observe(ref.current);return()=>o.disconnect();},[]);return[ref,v];}
function useScrollReveal(ref){const[p,setP]=useState(0);useEffect(()=>{const fn=()=>{if(!ref.current)return;const r=ref.current.getBoundingClientRect();const vh=window.innerHeight;const prog=Math.max(0,Math.min(1,(vh*0.88-r.top)/(vh*0.52)));setP(prog);};window.addEventListener("scroll",fn,{passive:true});fn();return()=>window.removeEventListener("scroll",fn);},[]);return p;}
function useCounter(target,active,dur=1800,dec=false){const[v,setV]=useState(0);useEffect(()=>{if(!active)return;const steps=dur/16;let c=0;const t=setInterval(()=>{c+=target/steps;if(c>=target){setV(target);clearInterval(t);}else setV(dec?Math.round(c*10)/10:Math.floor(c));},16);return()=>clearInterval(t);},[active,target]);return v;}
function useBreak(){const[b,setB]=useState("desktop");useEffect(()=>{const fn=()=>setB(window.innerWidth<768?"mobile":window.innerWidth<1024?"tablet":"desktop");fn();window.addEventListener("resize",fn);return()=>window.removeEventListener("resize",fn);},[]);return b;}

/* ── WORD REVEAL ───────────────────────────────────────── */
function RevealWords({text,gold=false,goldFrom=0.6,fontSize,fontFamily,style={},weight}){
  const ref=useRef(null);
  const p=useScrollReveal(ref);
  const words=text.split(" ");
  const revealed=p*(words.length+2);
  return(
    <span ref={ref} style={{...style}}>
      {words.map((w,i)=>{
        const shown=i<revealed;
        const isGold=gold&&(i/words.length)>=goldFrom;
        return(
          <span key={i} style={{
            display:"inline",
            color:shown?(isGold?G:"#fff"):"rgba(255,255,255,0.07)",
            transition:`color 0.45s ease ${Math.max(0,(i-revealed+1))*0.04}s`,
          }}>{w}{" "}</span>
        );
      })}
    </span>
  );
}

/* ── LOADING LINE ──────────────────────────────────────── */
function LoadingLine(){
  const[w,setW]=useState(0);const[op,setOp]=useState(1);
  useEffect(()=>{
    const t1=setTimeout(()=>setW(55),150);
    const t2=setTimeout(()=>setW(100),2000);
    const t3=setTimeout(()=>setOp(0),3200);
    return()=>[t1,t2,t3].forEach(clearTimeout);
  },[]);
  return <div style={{position:"fixed",top:0,left:0,right:0,height:2,zIndex:99999,pointerEvents:"none",opacity:op,transition:"opacity 0.6s ease"}}><div style={{height:"100%",width:`${w}%`,background:`linear-gradient(90deg,${G},${GL},${G})`,backgroundSize:"200%",animation:"shimmer 2s ease infinite",transition:"width 2.2s cubic-bezier(0.4,0,0.2,1)",boxShadow:`0 0 10px ${G}80`}}/></div>;
}

/* ── LOADER ────────────────────────────────────────────── */
function Loader({onDone}){
  const[s,setS]=useState(0);
  useEffect(()=>{
    const t1=setTimeout(()=>setS(1),300);
    const t2=setTimeout(()=>setS(2),1400);
    const t3=setTimeout(()=>setS(3),2400);
    const t4=setTimeout(()=>onDone(),3000);
    return()=>[t1,t2,t3,t4].forEach(clearTimeout);
  },[]);
  return(
    <div style={{position:"fixed",inset:0,zIndex:9999,background:BG,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:s===3?0:1,transition:s===3?"opacity 0.7s ease":"none",pointerEvents:s===3?"none":"all"}}>
      <div style={{width:1,height:s>=1?72:0,background:`linear-gradient(to bottom,transparent,${G})`,transition:"height 1s cubic-bezier(0.16,1,0.3,1)",marginBottom:32}}/>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:80,letterSpacing:28,background:`linear-gradient(135deg,#fff 0%,${GL} 50%,#fff 100%)`,backgroundSize:"300%",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",opacity:s>=1?1:0,transform:s>=1?"translateY(0)":"translateY(16px)",transition:"opacity 0.8s ease 0.2s,transform 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s",animation:s>=1?"shimmer 3s ease infinite":"none"}}>LUXX</div>
      <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:300,fontSize:10,letterSpacing:8,color:"rgba(255,255,255,0.3)",marginTop:12,opacity:s>=2?1:0,transition:"opacity 0.6s ease"}}>FINE JEWELRY</div>
      <div style={{width:1,height:s>=2?72:0,background:`linear-gradient(to bottom,${G},transparent)`,transition:"height 1s cubic-bezier(0.16,1,0.3,1)",marginTop:32}}/>
    </div>
  );
}

/* ── GRAIN ─────────────────────────────────────────────── */
function Grain(){return <div style={{position:"fixed",inset:0,zIndex:997,pointerEvents:"none",opacity:0.035,backgroundImage:`url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")`,backgroundSize:"200px"}}/>;}

/* ── WATCH BG OPACITY ──────────────────────────────────── */
function bgOp(i,p){const n=WATCHES.length,seg=1/n,s=i*seg,e=(i+1)*seg,f=seg*0.3;if(i===0&&p<=e-f)return 1;if(i===0&&p<=e)return 1-(p-(e-f))/f;if(i===0)return 0;if(i===n-1&&p>=s)return Math.min(1,(p-s)/f);if(i===n-1)return 0;if(p<s)return 0;if(p<s+f)return(p-s)/f;if(p<=e-f)return 1;if(p<=e)return 1-(p-(e-f))/f;return 0;}
function watchIdx(p){return Math.min(WATCHES.length-1,Math.floor(p*WATCHES.length));}

/* ── WATCH SHOWCASE ────────────────────────────────────── */
function WatchShowcase({inView,onAccent,isMobile,isTablet,A}){
  const[idx,setIdx]=useState(0);const[trans,setTrans]=useState(false);const[prog,setProg]=useState(0);const[nk,setNk]=useState(0);
  const[tilt,setTilt]=useState({x:0,y:0});
  const stageRef=useRef(null);const timerRef=useRef(null);const progRef=useRef(null);const idxRef=useRef(0);
  const go=useCallback((next)=>{
    if(next===idxRef.current)return;
    setTrans(true);clearInterval(progRef.current);clearTimeout(timerRef.current);setProg(0);
    setTimeout(()=>{idxRef.current=next;setIdx(next);setNk(k=>k+1);onAccent&&onAccent(WATCHES[next].accent);setTrans(false);start();},900);
  },[onAccent]);
  const start=useCallback(()=>{
    clearInterval(progRef.current);clearTimeout(timerRef.current);
    let p=0;progRef.current=setInterval(()=>{p+=100/(5500/50);setProg(Math.min(100,p));},50);
    timerRef.current=setTimeout(()=>go((idxRef.current+1)%WATCHES.length),5500);
  },[go]);
  useEffect(()=>{if(!inView)return;onAccent&&onAccent(WATCHES[0].accent);start();return()=>{clearTimeout(timerRef.current);clearInterval(progRef.current);};},[inView]);
  const mm=(e)=>{if(isMobile||!stageRef.current)return;const r=stageRef.current.getBoundingClientRect();setTilt({x:((e.clientY-r.top-r.height/2)/(r.height/2))*-4,y:((e.clientX-r.left-r.width/2)/(r.width/2))*8});};
  const cur=WATCHES[idx];
  return(
    <div style={{maxWidth:1200,margin:"0 auto",display:"grid",gridTemplateColumns:isMobile?"1fr":isTablet?"1fr 1fr":"2fr 3fr",gap:isMobile?0:isTablet?48:100,alignItems:"center"}}>
      {!isMobile&&(
        <div style={{paddingLeft:isMobile?0:20}}>
          <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:6,color:cur.accent,marginBottom:24,transition:"color 1s ease"}}>{cur.col.toUpperCase()}</p>
          <div key={nk} style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(44px,4.5vw,64px)",letterSpacing:4,lineHeight:0.88,color:"#fff",marginBottom:24,overflow:"hidden"}}>
            {cur.name.split(" ").map((w,wi)=>(<div key={wi} style={{overflow:"hidden"}}>{w.split("").map((c,ci)=>(<span key={ci} style={{display:"inline-block",animation:`letterRise 0.9s cubic-bezier(0.16,1,0.3,1) ${(wi*w.length+ci)*0.05}s both`}}>{c}</span>))}</div>))}
          </div>
          <div style={{width:40,height:1,background:cur.accent,marginBottom:24,transition:"background 1s ease"}}/>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:16,color:"rgba(255,255,255,0.4)",lineHeight:1.9,marginBottom:6}}>{cur.spec}</p>
          <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,letterSpacing:4,color:"rgba(255,255,255,0.18)",marginBottom:64}}>REF. {cur.ref}</p>
          <div style={{display:"flex",alignItems:"center",gap:14}}>
            {WATCHES.map((_,i)=>(<div key={i} onClick={()=>go(i)} style={{cursor:"pointer",display:"flex",flexDirection:"column",gap:6}}><div style={{width:i===idx?28:6,height:1,background:i===idx?cur.accent:"rgba(255,255,255,0.2)",transition:"all 0.6s ease"}}/><span style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,letterSpacing:2,color:i===idx?cur.accent:"rgba(255,255,255,0.18)",transition:"color 0.6s ease"}}>0{i+1}</span></div>))}
            <div style={{flex:1,height:1,background:"rgba(255,255,255,0.07)",position:"relative",overflow:"hidden"}}><div style={{position:"absolute",inset:0,width:`${prog}%`,background:cur.accent,transition:"background 1s ease"}}/></div>
          </div>
        </div>
      )}
      <div ref={stageRef} onMouseMove={mm} onMouseLeave={()=>setTilt({x:0,y:0})} style={{position:"relative",perspective:1400,display:"flex",justifyContent:"center",alignItems:"center",minHeight:isMobile?300:520}}>
        <div style={{position:"absolute",bottom:"6%",left:"50%",transform:"translateX(-50%)",width:"45%",height:48,borderRadius:"50%",background:cur.accent,filter:"blur(48px)",opacity:0.28,transition:"background 1s ease",pointerEvents:"none"}}/>
        <div style={{width:isMobile?"85%":"90%",maxWidth:400,height:isMobile?280:480,transformStyle:"preserve-3d",transform:`rotateX(${tilt.x}deg) rotateY(${tilt.y}deg)`,transition:"transform 0.14s ease-out",position:"relative"}}>
          {WATCHES.map((w,i)=>(<img key={i} src={w.img} alt={w.name} style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"contain",opacity:i===idx?(trans?0:1):0,transform:i===idx?(trans?"scale(0.92) translateY(-16px)":"scale(1) translateY(0)"):"scale(0.96) translateY(20px)",transition:"opacity 0.9s cubic-bezier(0.4,0,0.2,1),transform 0.9s cubic-bezier(0.16,1,0.3,1)",filter:`drop-shadow(0 20px 56px rgba(${w.rgb},0.42)) drop-shadow(0 4px 18px rgba(${w.rgb},0.22))`,animation:i===idx?"watchFloat 7s ease-in-out infinite":"none",pointerEvents:"none"}}/>))}
          <img src={WATCHES[idx].img} alt="" aria-hidden="true" style={{position:"absolute",bottom:"-18%",left:0,width:"100%",height:"30%",objectFit:"contain",objectPosition:"top center",opacity:trans?0:0.06,transform:"scaleY(-1)",filter:"blur(8px)",transition:"opacity 0.9s ease",pointerEvents:"none"}}/>
        </div>
      </div>
      {isMobile&&(<div style={{padding:"32px 0 0",textAlign:"center"}}><p style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:5,color:cur.accent,marginBottom:12,transition:"color 1s ease"}}>{cur.col.toUpperCase()}</p><div key={nk} style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:40,letterSpacing:4,lineHeight:0.9,color:"#fff",marginBottom:14,animation:"letterRise 0.9s cubic-bezier(0.16,1,0.3,1)"}}>{cur.name}</div><div style={{width:28,height:1,background:cur.accent,margin:"0 auto 14px",transition:"background 1s ease"}}/><p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:14,color:"rgba(255,255,255,0.38)",marginBottom:24}}>{cur.spec}</p><div style={{display:"flex",justifyContent:"center",gap:12}}>{WATCHES.map((_,i)=>(<div key={i} onClick={()=>go(i)} style={{width:i===idx?24:6,height:1.5,background:i===idx?cur.accent:"rgba(255,255,255,0.18)",cursor:"pointer",transition:"all 0.6s ease"}}/>))}</div></div>)}
    </div>
  );
}

/* ── CATEGORY ROW ──────────────────────────────────────── */
function CatRow({cat,i,A}){
  const[hov,setHov]=useState(false);
  const[inView,setInView]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setInView(true);},{threshold:0.08});if(ref.current)o.observe(ref.current);return()=>o.disconnect();},[]);
  return(
    <div ref={ref} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{position:"relative",overflow:"hidden",borderBottom:"1px solid rgba(201,168,76,0.1)",cursor:"pointer",opacity:inView?1:0,transform:inView?"translateY(0)":"translateY(40px)",transition:`opacity 1s ease ${i*0.12}s,transform 1s cubic-bezier(0.16,1,0.3,1) ${i*0.12}s`}}>
      {/* bg image */}
      <div style={{position:"absolute",inset:0,backgroundImage:`url(${cat.img})`,backgroundSize:"cover",backgroundPosition:"center",opacity:hov?0.22:0,transition:"opacity 0.8s ease"}}/>
      {/* gold left line */}
      <div style={{position:"absolute",left:0,top:0,bottom:0,width:hov?3:0,background:A,transition:"width 0.4s ease,background 0.9s ease"}}/>
      {/* content */}
      <div style={{position:"relative",zIndex:1,display:"flex",alignItems:"center",padding:"52px 60px",gap:40,flexWrap:"wrap"}}>
        <div style={{flex:"0 0 auto",minWidth:260,maxWidth:380}}>
          <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:5,color:hov?A:"rgba(255,255,255,0.22)",marginBottom:14,transition:"color 0.4s ease,color 0.9s ease"}}>{cat.num}</p>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:17,color:"rgba(255,255,255,0.42)",lineHeight:1.75}}>{cat.desc}</p>
        </div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(64px,8.5vw,128px)",letterSpacing:"0.06em",color:hov?A:"#fff",marginLeft:"auto",lineHeight:1,transition:"color 0.4s ease,color 0.9s ease"}}>{cat.name}</div>
        <svg width="36" height="18" viewBox="0 0 36 18" fill="none" style={{flexShrink:0,opacity:hov?1:0.25,transform:hov?"translateX(6px)":"none",transition:"opacity 0.4s ease,transform 0.4s ease"}}><path d="M0 9H34M27 2L34 9L27 16" stroke={hov?A:"white"} strokeWidth="1.5"/></svg>
      </div>
    </div>
  );
}

/* ── STAT ──────────────────────────────────────────────── */
function Stat({n,s,label,active,dec,A}){const v=useCounter(n,active,1800,dec);return(<div style={{textAlign:"center"}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(48px,5vw,70px)",letterSpacing:4,lineHeight:1,background:`linear-gradient(135deg,${A} 0%,${GL} 60%,${A} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",transition:"background 0.9s ease"}}>{dec?v.toFixed(1):v}{s}</div><p style={{fontFamily:"'Montserrat',sans-serif",fontWeight:300,fontSize:9,letterSpacing:4,color:"rgba(255,255,255,0.32)",marginTop:10,textTransform:"uppercase"}}>{label}</p></div>);}

/* ── WATCH INDICATOR ───────────────────────────────────── */
function WatchIndicator({p,A,isMobile}){
  const i=watchIdx(p);
  return(<div style={{position:"fixed",bottom:isMobile?14:36,right:isMobile?10:44,zIndex:100,textAlign:"right",pointerEvents:"none"}}>
    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:7,marginBottom:12}}>
      {WATCHES.map((_,j)=>(<div key={j} style={{display:"flex",alignItems:"center",gap:7}}>
        <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:7,letterSpacing:3,color:j===i?A:"rgba(255,255,255,0.18)",transition:"color 0.8s ease",display:isMobile?"none":"inline"}}>{WATCHES[j].name}</span>
        <div style={{width:j===i?22:5,height:2,background:j===i?A:j<i?`${A}50`:"rgba(255,255,255,0.12)",borderRadius:2,transition:"all 0.6s ease"}}/>
      </div>))}
    </div>
    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:isMobile?16:24,letterSpacing:3,color:A,transition:"color 0.9s ease",lineHeight:1}}>{WATCHES[i].time}</div>
    <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:7,letterSpacing:3,color:"rgba(255,255,255,0.25)",marginTop:3}}>CURRENT PIECE</p>
  </div>);}

/* ── MAIN ──────────────────────────────────────────────── */
function Luxx(){
  const[loading,setLoading]=useState(true);
  const[ready,setReady]=useState(false);
  const[A,setA]=useState(G);
  const bgP=useBgProgress();
  const scrollY=useScrollY();
  const bp=useBreak();
  const isMobile=bp==="mobile",isTablet=bp==="tablet";
  const vh=typeof window!=="undefined"?window.innerHeight:800;

  const[mRef,mIV]=useInView(0.04);
  const[sRef,sIV]=useInView(0.2);
  const[scRef,scIV]=useInView(0.06);
  const[catRef,catIV]=useInView(0.05);
  const[crRef,crIV]=useInView(0.15);
  const[tRef,tIV]=useInView(0.1);
  const[ctaRef,ctaIV]=useInView(0.15);
  const[chevRef,chevIV]=useInView(0.1);
  const[tIdx,setTIdx]=useState(0);

  /* Lenis */
  useEffect(()=>{
    if(typeof Lenis==="undefined")return;
    const l=new Lenis({duration:1.6,easing:t=>Math.min(1,1.001-Math.pow(2,-10*t)),smoothWheel:true,wheelMultiplier:0.75});
    function raf(t){l.raf(t);requestAnimationFrame(raf);}
    requestAnimationFrame(raf);
    return()=>l.destroy();
  },[]);

  /* GSAP entrance */
  useEffect(()=>{
    if(loading||!window.gsap)return;
    setReady(true);
    const g=window.gsap;
    const tl=g.timeline({delay:0.5});
    tl.from(".hero-scene-luxx",{y:70,opacity:0,duration:2.2,ease:"power3.out"})
      .from(".hero-line-1",{y:90,opacity:0,duration:1.6,ease:"power4.out"},"-=1.6")
      .from(".hero-line-2",{y:90,opacity:0,duration:1.6,ease:"power4.out"},"-=1.3")
      .from(".hero-tagline",{y:28,opacity:0,duration:1.1,ease:"power3.out"},"-=0.9")
      .from(".hero-cta-wrap",{y:22,opacity:0,duration:0.9,ease:"power3.out"},"-=0.7")
      .from(".hero-scroll",{opacity:0,duration:0.7},"-=0.4");
  },[loading]);

  const ghostY=scrollY*0.32;
  const ghostOp=Math.max(0,1-(scrollY/(vh*0.72)));
  const contentY=scrollY*0.11;

  return(
    <div style={{background:BG,color:"#fff",fontFamily:"'Cormorant Garamond',Georgia,serif",overflowX:"hidden"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=Montserrat:wght@200;300;400;500&display=swap');
        *{box-sizing:border-box;}
        ::-webkit-scrollbar{width:2px;}
        ::-webkit-scrollbar-track{background:#080808;}
        ::-webkit-scrollbar-thumb{background:${G};}
        ::selection{background:${G}44;}
        a{text-decoration:none;color:inherit;}
        .nav-lnk{font-family:'Montserrat',sans-serif;font-weight:300;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.45);text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;display:inline-block;transition:color 0.3s;}
        .nav-lnk span{display:block;transition:transform 0.6s cubic-bezier(0.16,1,0.3,1);}
        .nav-lnk span::before{content:attr(data-text);position:absolute;top:100%;left:0;width:100%;color:${G};}
        .nav-lnk:hover span{transform:translateY(-100%);}
        .btn-p{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;border:1px solid ${G};color:#000;background:${G};padding:16px 48px;cursor:pointer;position:relative;overflow:hidden;transition:background 0.5s ease,border-color 0.9s ease;}
        .btn-p .t{display:block;transition:transform 0.6s cubic-bezier(0.16,1,0.3,1);}
        .btn-p .t::before{content:attr(data-text);position:absolute;top:100%;left:0;width:100%;text-align:center;color:${G};}
        .btn-p:hover .t{transform:translateY(-100%);}
        .btn-p:hover{background:transparent;color:${G};}
        .btn-s{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.6);background:transparent;padding:16px 48px;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.5s,color 0.5s;}
        .btn-s .t{display:block;transition:transform 0.6s cubic-bezier(0.16,1,0.3,1);}
        .btn-s .t::before{content:attr(data-text);position:absolute;top:100%;left:0;width:100%;text-align:center;color:#fff;}
        .btn-s:hover .t{transform:translateY(-100%);}
        .btn-s:hover{border-color:rgba(255,255,255,0.6);color:#fff;}
        .btn-round{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.5);background:transparent;padding:12px 28px;border-radius:100px;cursor:pointer;transition:all 0.4s ease;}
        .btn-round:hover{border-color:${G};color:${G};}
        @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
        @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
        @keyframes pulse{0%,100%{opacity:0.25}50%{opacity:1}}
        @keyframes watchFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-13px)}}
        @keyframes letterRise{from{transform:translateY(115%);opacity:0}to{transform:translateY(0);opacity:1}}
        @keyframes ringPulse{0%,100%{border-color:rgba(201,168,76,0.07)}50%{border-color:rgba(201,168,76,0.28)}}
        @media(max-width:767px){.btn-p,.btn-s{padding:14px 28px !important;width:100%;max-width:240px;}}
        @media(max-width:767px){.cat-row-pad{padding:32px 20px !important;}}
      `}</style>

      <LoadingLine/>
      {loading&&<Loader onDone={()=>setLoading(false)}/>}
      <Grain/>

      {/* ── FIXED WATCH BACKGROUNDS ── */}
      <div style={{position:"fixed",inset:0,zIndex:0,overflow:"hidden"}}>
        {WATCHES.map((w,i)=>(<div key={i} style={{position:"absolute",inset:0,backgroundImage:`url(${w.img})`,backgroundSize:"cover",backgroundPosition:"center",opacity:bgOp(i,bgP),transform:isMobile?"none":`translateY(${(bgP-(i+0.5)/WATCHES.length)*-80}px) scale(1.08)`,transition:"opacity 1.2s ease",willChange:"opacity,transform"}}/>))}
        <div style={{position:"absolute",inset:0,background:"rgba(8,8,8,0.55)"}}/>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at center,transparent 30%,rgba(8,8,8,0.68) 100%)"}}/>
        <div style={{position:"absolute",top:0,left:0,right:0,height:"22%",background:"linear-gradient(to bottom,rgba(8,8,8,0.75),transparent)"}}/>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:"28%",background:"linear-gradient(to top,rgba(8,8,8,0.92),transparent)"}}/>
      </div>

      {!loading&&<WatchIndicator p={bgP} A={A} isMobile={isMobile}/>}

      {/* ── NAV ── */}
      <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:1000,padding:isMobile?"14px 20px":isTablet?"20px 40px":"24px 60px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"linear-gradient(to bottom,rgba(8,8,8,0.88),transparent)",opacity:loading?0:1,transition:"opacity 0.9s ease 0.5s",backdropFilter:"blur(1px)"}}>
        <div style={{display:isMobile?"none":"flex",gap:44}}>
          <span className="nav-lnk"><span data-text="Collections">Collections</span></span>
          <span className="nav-lnk"><span data-text="About">About</span></span>
          <span className="nav-lnk"><span data-text="Craft">Craft</span></span>
        </div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:isMobile?22:28,letterSpacing:isMobile?8:14,background:`linear-gradient(135deg,#fff 0%,${GL} 55%,#fff 100%)`,backgroundSize:"300%",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"shimmer 6s ease infinite",position:isMobile?"static":"absolute",left:isMobile?"auto":"50%",transform:isMobile?"none":"translateX(-50%)"}}>LUXX</div>
        <div style={{display:"flex",gap:28,alignItems:"center"}}>
          <span className="nav-lnk" style={{display:isMobile?"none":"inline"}}><span data-text="Contact">Contact</span></span>
          <button className="btn-round" style={{fontSize:9,padding:"8px 20px",borderColor:`${A}80`,color:A,transition:"all 0.6s ease"}}>Shop Now</button>
        </div>
      </nav>

      {/* ── SCROLLABLE ── */}
      <div style={{position:"relative",zIndex:2}}>

        {/* ═══════════════════════════════════════════════════
            HERO
        ═══════════════════════════════════════════════════ */}
        <section style={{height:"100vh",position:"relative",overflow:"hidden",display:"flex",alignItems:"flex-start",justifyContent:"center"}}>

          {/* Ghost LUXX scene wordmark — depth layer */}
          <div className="hero-scene-luxx" style={{
            position:"absolute",
            bottom:isMobile?"8%":"12%",
            left:"50%",
            transform:`translateX(-50%) translateY(${-ghostY}px)`,
            opacity:ghostOp,
            zIndex:2,
            pointerEvents:"none",
            whiteSpace:"nowrap",
            fontFamily:"'Bebas Neue',sans-serif",
            fontSize:"clamp(160px,26vw,360px)",
            letterSpacing:"0.1em",
            WebkitTextFillColor:"transparent",
            WebkitTextStroke:`2px rgba(201,168,76,0.62)`,
            color:"transparent",
            lineHeight:1,
            willChange:"transform,opacity",
          }}>LUXX</div>

          {/* "Fine Jewelry." outlined below scene wordmark */}
          <div style={{
            position:"absolute",
            bottom:isMobile?"3%":"5%",
            left:"50%",
            transform:`translateX(-50%) translateY(${-ghostY*0.6}px)`,
            opacity:ghostOp*0.7,
            zIndex:2,
            pointerEvents:"none",
            whiteSpace:"nowrap",
            fontFamily:"'Cormorant Garamond',serif",
            fontStyle:"italic",
            fontSize:"clamp(20px,3.2vw,42px)",
            fontWeight:300,
            letterSpacing:"0.3em",
            WebkitTextFillColor:"transparent",
            WebkitTextStroke:`1px rgba(201,168,76,0.4)`,
            color:"transparent",
          }}>Fine Jewelry.</div>

          {/* Atmospheric glow */}
          <div style={{position:"absolute",bottom:"18%",left:"50%",transform:"translateX(-50%)",width:"60%",height:"30%",background:A,filter:"blur(100px)",opacity:0.04,transition:"background 0.9s ease",pointerEvents:"none",zIndex:1}}/>

          {/* Hero content — TOP of viewport */}
          <div style={{
            position:"relative",
            zIndex:3,
            textAlign:"center",
            padding:isMobile?"0 24px":"0 60px",
            marginTop:isMobile?"18vh":"16vh",
            transform:`translateY(${-contentY}px)`,
            willChange:"transform",
          }}>
            <div className="hero-tagline" style={{fontFamily:"'Montserrat',sans-serif",fontWeight:300,fontSize:isMobile?8:9,letterSpacing:isMobile?5:8,color:A,marginBottom:isMobile?20:32,opacity:0,transition:"color 0.9s ease"}}>
              EST. 2024 &nbsp;·&nbsp; FINE JEWELRY &nbsp;·&nbsp; JACKSON, MS
            </div>

            {/* Line 1 */}
            <div className="hero-line-1" style={{overflow:"hidden",opacity:0}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(72px,14vw,172px)",letterSpacing:isMobile?2:8,lineHeight:0.88,color:"#fff",whiteSpace:"nowrap"}}>
                MUSEUM QUALITY.
              </div>
            </div>

            {/* Line 2 */}
            <div className="hero-line-2" style={{overflow:"hidden",opacity:0}}>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(72px,14vw,172px)",letterSpacing:isMobile?2:8,lineHeight:0.88,WebkitTextFillColor:"transparent",WebkitTextStroke:`2px ${A}`,color:"transparent",whiteSpace:"nowrap",marginBottom:isMobile?32:52,transition:"color 0.9s ease,-webkit-text-stroke 0.9s ease"}}>
                REAL&#8209;WORLD PRICES.
              </div>
            </div>

            <div className="hero-cta-wrap" style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap",opacity:0}}>
              <button className="btn-p"><span className="t" data-text="Explore Collection">Explore Collection</span></button>
              <button className="btn-s"><span className="t" data-text="Our Story">Our Story</span></button>
            </div>
          </div>

          {/* Scroll indicator */}
          <div className="hero-scroll" style={{position:"absolute",bottom:isMobile?24:40,left:"50%",transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:10,opacity:0,zIndex:3}}>
            <div style={{width:1,height:48,background:`linear-gradient(to bottom,${A},transparent)`,animation:"pulse 2.8s ease infinite",transition:"background 0.9s ease"}}/>
            <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:7,letterSpacing:4,color:"rgba(255,255,255,0.22)"}}>SCROLL</span>
          </div>
        </section>

        {/* Marquee */}
        <div style={{borderTop:`1px solid ${A}22`,borderBottom:`1px solid ${A}22`,padding:"15px 0",overflow:"hidden",background:"rgba(8,8,8,0.9)",transition:"border-color 0.9s ease"}}>
          <div style={{display:"flex",gap:72,whiteSpace:"nowrap",animation:"marquee 30s linear infinite"}}>
            {[...Array(8)].map((_,i)=>(<span key={i} style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:5,color:A,transition:"color 0.9s ease"}}>Chains &nbsp;·&nbsp; Watches &nbsp;·&nbsp; Rings &nbsp;·&nbsp; Custom Orders &nbsp;·&nbsp; Free Shipping &nbsp;·&nbsp; Lifetime Sizing &nbsp;·&nbsp;</span>))}
          </div>
        </div>

        {/* ═══════════════════════════════════════════════════
            BRAND MANIFESTO
        ═══════════════════════════════════════════════════ */}
        <section ref={mRef} style={{padding:isMobile?"80px 24px 72px":isTablet?"120px 40px 100px":"180px 60px 160px",position:"relative",background:"rgba(8,8,8,0.82)"}}>
          <div style={{position:"absolute",right:-40,top:"40%",transform:"translateY(-50%)",fontFamily:"'Bebas Neue',sans-serif",fontSize:"42vw",color:"rgba(201,168,76,0.025)",lineHeight:1,userSelect:"none",pointerEvents:"none"}}>L</div>
          <div style={{maxWidth:920,position:"relative",zIndex:1}}>
            <div style={{opacity:mIV?1:0,transform:mIV?"translateY(0)":"translateY(20px)",transition:"opacity 1s ease,transform 1s cubic-bezier(0.16,1,0.3,1)",marginBottom:40}}>
              <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:7,color:A,transition:"color 0.9s ease"}}>OUR PHILOSOPHY</span>
            </div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(52px,8vw,108px)",letterSpacing:3,lineHeight:0.88,marginBottom:isMobile?28:44}}>
              <div style={{overflow:"hidden"}}><div style={{transform:mIV?"translateY(0)":"translateY(105%)",transition:"transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.1s",color:"#fff"}}>THIS ISN'T JUST</div></div>
              <div style={{overflow:"hidden"}}><div style={{transform:mIV?"translateY(0)":"translateY(105%)",transition:"transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.28s",color:A,transition:"transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.28s, color 0.9s ease"}}>FINE JEWELRY.</div></div>
            </div>
            <div style={{width:mIV?52:0,height:1,background:A,marginBottom:40,transition:"width 1.2s ease 0.5s,background 0.9s ease"}}/>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:"clamp(19px,2.4vw,28px)",fontWeight:300,lineHeight:1.78,maxWidth:680,opacity:mIV?1:0,transition:"opacity 0.9s ease 0.7s"}}>
              <RevealWords text="It's about the statement you make when you walk into a room. About the legacy you carry on your wrist and around your neck. Fine jewelry has always belonged to everyone who understands its power — we built Luxx so the price tag finally agrees." gold={true} goldFrom={0.72}/>
            </div>
          </div>
        </section>

        {/* ═══════════════════════════════════════════════════
            WATCH CHEVRON STRIP
        ═══════════════════════════════════════════════════ */}
        <section ref={chevRef} style={{padding:isMobile?"0 0 72px":"0 0 120px",background:"rgba(8,8,8,0.82)",overflow:"hidden"}}>
          <div style={{display:"flex",justifyContent:"center",alignItems:"stretch",marginBottom:isMobile?40:64}}>
            {WATCHES.map((w,i)=>(<div key={i} style={{width:isMobile?"33.33%":"clamp(180px,26vw,360px)",height:isMobile?180:isTablet?280:420,clipPath:"polygon(10% 0%,100% 0%,90% 100%,0% 100%)",overflow:"hidden",marginLeft:i>0?isMobile?"-4%":"-3.5%":"0",opacity:chevIV?1:0,transform:chevIV?"translateY(0)":"translateY(48px)",transition:`opacity 1s ease ${i*0.18}s,transform 1s cubic-bezier(0.16,1,0.3,1) ${i*0.18}s`,flexShrink:0}}>
              <img src={w.img} alt={w.name} style={{width:"115%",height:"115%",objectFit:"cover",objectPosition:"center",marginLeft:"-7.5%",filter:`brightness(0.82) saturate(1.1) hue-rotate(${i*4}deg)`}}/>
            </div>))}
          </div>
          <div style={{textAlign:"center",padding:isMobile?"0 24px":"0 60px",opacity:chevIV?1:0,transition:"opacity 0.9s ease 0.5s"}}>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:"clamp(17px,2.1vw,23px)",color:"rgba(255,255,255,0.5)",maxWidth:560,margin:"0 auto 32px",lineHeight:1.72}}>Three watches. Three stories. One standard of craftsmanship.</p>
            <button className="btn-round" style={{borderColor:`${A}60`,color:A}}>View the Collection</button>
          </div>
        </section>

        {/* ═══════════════════════════════════════════════════
            STATS
        ═══════════════════════════════════════════════════ */}
        <section ref={sRef} style={{padding:isMobile?"60px 20px":isTablet?"80px 40px":"120px 60px",background:"rgba(6,6,6,0.95)",borderTop:`1px solid ${A}14`,borderBottom:`1px solid ${A}14`,transition:"border-color 0.9s ease"}}>
          <div style={{display:"flex",justifyContent:"center",flexWrap:"wrap",maxWidth:960,margin:"0 auto",gap:isMobile?"0":"0"}}>
            {STATS.map((s,i)=>(<div key={s.label} style={{padding:isMobile?"0 0 40px 0":isTablet?"0 36px":"0 60px",width:isMobile?"50%":"auto",textAlign:"center",borderRight:isMobile?"none":(i<STATS.length-1?`1px solid ${A}12`:"none"),opacity:sIV?1:0,transform:sIV?"translateY(0)":"translateY(32px)",transition:`opacity 0.9s ease ${i*0.13}s,transform 0.9s cubic-bezier(0.16,1,0.3,1) ${i*0.13}s`}}><Stat {...s} A={A} active={sIV}/></div>))}
          </div>
        </section>

        {/* ═══════════════════════════════════════════════════
            WATCH SHOWCASE
        ═══════════════════════════════════════════════════ */}
        <section ref={scRef} style={{background:"rgba(5,5,5,0.96)",padding:isMobile?"72px 20px 80px":isTablet?"100px 40px 120px":"160px 60px 180px",borderBottom:`1px solid ${A}12`,position:"relative",overflow:"hidden",transition:"border-color 0.9s ease"}}>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:"50%",height:"40%",borderRadius:"50%",background:A,filter:"blur(120px)",opacity:0.03,transition:"background 0.9s ease",pointerEvents:"none"}}/>
          <div style={{textAlign:"center",marginBottom:isMobile?56:100,position:"relative",zIndex:1}}>
            <div style={{opacity:scIV?1:0,transform:scIV?"translateY(0)":"translateY(18px)",transition:"opacity 1s ease,transform 1s cubic-bezier(0.16,1,0.3,1)",marginBottom:16}}><span style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:7,color:A,transition:"color 0.9s ease"}}>THE COLLECTION</span></div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(44px,6.5vw,88px)",letterSpacing:isMobile?3:8,lineHeight:0.88,marginBottom:18,overflow:"hidden"}}><div style={{transform:scIV?"translateY(0)":"translateY(105%)",transition:"transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.1s",color:"#fff"}}>ICONS OF CRAFT</div></div>
            <div style={{opacity:scIV?1:0,transition:"opacity 0.9s ease 0.4s"}}><p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:"clamp(15px,1.8vw,19px)",color:"rgba(255,255,255,0.32)"}}>Hover. Explore. Experience each piece in detail.</p></div>
          </div>
          <div style={{opacity:scIV?1:0,transform:scIV?"translateY(0)":"translateY(48px)",transition:"opacity 1.2s ease 0.3s,transform 1.2s cubic-bezier(0.16,1,0.3,1) 0.3s",position:"relative",zIndex:1}}>
            <WatchShowcase inView={scIV} onAccent={setA} isMobile={isMobile} isTablet={isTablet} A={A}/>
          </div>
          <div style={{textAlign:"center",marginTop:isMobile?52:80,opacity:scIV?1:0,transition:"opacity 0.9s ease 1s",position:"relative",zIndex:1}}>
            <div style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap"}}>
              <button className="btn-p"><span className="t" data-text="Shop Timepieces">Shop Timepieces</span></button>
              <button className="btn-s"><span className="t" data-text="Custom Commission">Custom Commission</span></button>
            </div>
          </div>
          {/* Corner marks */}
          {[[{top:24,left:24},{borderTop:`1px solid ${A}`,borderLeft:`1px solid ${A}`}],[{top:24,right:24},{borderTop:`1px solid ${A}`,borderRight:`1px solid ${A}`}],[{bottom:24,left:24},{borderBottom:`1px solid ${A}`,borderLeft:`1px solid ${A}`}],[{bottom:24,right:24},{borderBottom:`1px solid ${A}`,borderRight:`1px solid ${A}`}]].map(([pos,border],i)=>(<div key={i} style={{position:"absolute",width:28,height:28,...pos,...border,opacity:scIV?0.45:0,transition:`opacity 0.6s ease ${0.6+i*0.06}s`}}/>))}
        </section>

        {/* ═══════════════════════════════════════════════════
            WHAT WE MAKE
        ═══════════════════════════════════════════════════ */}
        <section ref={catRef} style={{background:"rgba(6,6,6,0.97)"}}>
          <div style={{padding:isMobile?"60px 24px 36px":isTablet?"80px 40px 48px":"120px 60px 60px",borderBottom:`1px solid ${A}10`,transition:"border-color 0.9s ease"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:20}}>
              <div>
                <div style={{opacity:catIV?1:0,transform:catIV?"translateY(0)":"translateY(18px)",transition:"opacity 1s ease,transform 1s cubic-bezier(0.16,1,0.3,1)",marginBottom:16}}><span style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:7,color:A,transition:"color 0.9s ease"}}>THE CATALOG</span></div>
                <div style={{overflow:"hidden"}}>
                  <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(44px,6vw,80px)",letterSpacing:4,lineHeight:0.88,transform:catIV?"translateY(0)":"translateY(105%)",transition:"transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.1s",color:"#fff"}}>WHAT WE MAKE.</div>
                </div>
              </div>
              <div style={{opacity:catIV?1:0,transition:"opacity 0.9s ease 0.5s"}}><button className="btn-round" style={{borderColor:`${A}60`,color:A}}>View All Products</button></div>
            </div>
          </div>
          <div>
            {CATS.map((c,i)=>(<CatRow key={c.name} cat={c} i={i} A={A}/>))}
          </div>
        </section>

        {/* ═══════════════════════════════════════════════════
            CRAFTSMANSHIP
        ═══════════════════════════════════════════════════ */}
        <section ref={crRef} style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",minHeight:isMobile?"auto":"82vh",background:"rgba(8,8,8,0.9)",borderTop:`1px solid ${A}10`,transition:"border-color 0.9s ease"}}>
          <div style={{position:"relative",overflow:"hidden",minHeight:isMobile?260:500}}>
            <div style={{position:"absolute",inset:0,backgroundImage:"url(https://images.unsplash.com/photo-1535632066829-9a41f1a01756?w=1400&q=90&fit=crop)",backgroundSize:"cover",backgroundPosition:"center",filter:"brightness(0.48) saturate(0.8)",transform:crIV?"scale(1.0)":"scale(1.08)",transition:"transform 1.6s cubic-bezier(0.16,1,0.3,1)"}}/>
            <div style={{position:"absolute",inset:0,background:isMobile?"linear-gradient(to bottom,transparent 50%,rgba(8,8,8,0.9) 100%)":"linear-gradient(to right,transparent 50%,rgba(8,8,8,0.9) 100%)"}}/>
          </div>
          <div style={{padding:isMobile?"40px 24px 60px":isTablet?"60px 40px":"120px 72px 120px 64px",display:"flex",flexDirection:"column",justifyContent:"center"}}>

            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(44px,5.5vw,68px)",letterSpacing:3,lineHeight:0.88,marginBottom:4}}>

              <div style={{overflow:"hidden"}}><div style={{color:"#fff",transform:crIV?"translateY(0)":"translateY(105%)",transition:"transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.22s"}}>WITHOUT</div></div>
              <div style={{overflow:"hidden"}}><div style={{color:A,transform:crIV?"translateY(0)":"translateY(105%)",transition:"transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.34s, color 0.9s ease"}}>COMPROMISE.</div></div>
            </div>
            <div style={{width:crIV?48:0,height:1,background:A,margin:"28px 0",transition:"width 1.2s ease 0.6s,background 0.9s ease"}}/>

              {["14K Gold","18K Gold","Moissanite","Lab Diamond","925 Silver"].map(m=>(<span key={m} style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,letterSpacing:3,border:`1px solid ${A}30`,color:"rgba(255,255,255,0.4)",padding:"8px 16px",transition:"all 0.4s ease",cursor:"pointer"}} onMouseEnter={e=>{e.target.style.borderColor=A;e.target.style.color=A;}} onMouseLeave={e=>{e.target.style.borderColor=`${A}30`;e.target.style.color="rgba(255,255,255,0.4)";}}>{m}</span>))}
            </div>
          </div>
        </section>

        {/* ═══════════════════════════════════════════════════
            TESTIMONIALS — FIND STYLE
        ═══════════════════════════════════════════════════ */}
        <section ref={tRef} style={{background:"rgba(10,10,10,0.98)",padding:isMobile?"72px 20px 80px":isTablet?"100px 40px 120px":"160px 60px 180px",borderTop:`1px solid ${A}10`,transition:"border-color 0.9s ease"}}>
          <div style={{maxWidth:1200,margin:"0 auto"}}>
            <div style={{marginBottom:isMobile?48:80}}>
              <div style={{opacity:tIV?1:0,transition:"opacity 1s ease",marginBottom:14}}><span style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:7,color:A,transition:"color 0.9s ease"}}>WHAT THEY'RE SAYING</span></div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(44px,6vw,80px)",letterSpacing:4,lineHeight:0.88}}>
                <div style={{overflow:"hidden"}}><div style={{color:"#fff",transform:tIV?"translateY(0)":"translateY(105%)",transition:"transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.1s"}}>DON'T TAKE</div></div>

              {/* Left photo */}
              <div style={{position:"relative",height:isMobile?260:520,overflow:"hidden",opacity:tIV?1:0,transition:"opacity 1.2s ease 0.3s"}}>
                <img src={TESTIMONIALS[tIdx].photo} style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:"center top",filter:"grayscale(15%) brightness(0.85)",transition:"all 0.9s ease"}} alt={TESTIMONIALS[tIdx].name}/>
                <div style={{position:"absolute",bottom:0,left:0,right:0,height:"40%",background:"linear-gradient(to top,rgba(10,10,10,0.8),transparent)"}}/>
              </div>
              {/* Right content */}
              <div style={{display:"flex",flexDirection:"column",justifyContent:"center",opacity:tIV?1:0,transition:"opacity 1.2s ease 0.4s"}}>
                <div style={{width:"100%",height:1,background:"rgba(255,255,255,0.1)",marginBottom:32}}/>
                {/* Pagination */}
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:40}}>
                  {TESTIMONIALS.map((_,i)=>(<button key={i} onClick={()=>setTIdx(i)} style={{width:36,height:36,borderRadius:"50%",border:`1px solid ${i===tIdx?A:"rgba(255,255,255,0.18)"}`,background:i===tIdx?A:"transparent",color:i===tIdx?"#000":"rgba(255,255,255,0.35)",fontFamily:"'Montserrat',sans-serif",fontSize:11,cursor:"pointer",transition:"all 0.5s ease,background 0.5s ease,border-color 0.9s ease"}}>{i+1}</button>))}
                  <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:64,color:A,lineHeight:0.8,marginLeft:"auto",opacity:0.55,transition:"color 0.9s ease"}}>"</span>
                </div>
                {/* Quote */}
                <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:"clamp(18px,2.2vw,24px)",color:"rgba(255,255,255,0.78)",lineHeight:1.75,marginBottom:40,transition:"opacity 0.5s ease",minHeight:isMobile?80:120}}>
                  {TESTIMONIALS[tIdx].quote}
                </p>
                <div style={{width:"100%",height:1,background:"rgba(255,255,255,0.08)",marginBottom:24}}/>
                <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                  <div style={{width:28,height:1,background:A,transition:"background 0.9s ease",flexShrink:0}}/>
                  <span style={{fontFamily:"'Montserrat',sans-serif",fontWeight:400,fontSize:11,letterSpacing:3,color:"#fff"}}>{TESTIMONIALS[tIdx].name}</span>
                  <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,color:"rgba(255,255,255,0.28)",letterSpacing:1}}>{TESTIMONIALS[tIdx].loc}</span>
                  <span style={{color:A,marginLeft:"auto",letterSpacing:3,fontSize:12,transition:"color 0.9s ease"}}>★★★★★</span>
                </div>
              </div>
            </div>
          </div>
        </section>

        {/* ═══════════════════════════════════════════════════
            CTA
        ═══════════════════════════════════════════════════ */}
        <section ref={ctaRef} style={{height:"90vh",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
          <div style={{position:"absolute",inset:0,background:"rgba(8,8,8,0.45)"}}/>
          {(isMobile?[160,260,340]:[480,680,880]).map((sz,ri)=>(<div key={sz} style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:ctaIV?sz:0,height:ctaIV?sz:0,border:`1px solid ${A}${ri===0?"22":ri===1?"12":"08"}`,borderRadius:"50%",transition:`width ${1.4+ri*0.2}s cubic-bezier(0.16,1,0.3,1) ${ri*0.14}s,height ${1.4+ri*0.2}s cubic-bezier(0.16,1,0.3,1) ${ri*0.14}s,border-color 0.9s ease`,animation:ri===0?"ringPulse 4.5s ease infinite":"none"}}/>))}
          <div style={{position:"relative",zIndex:2,textAlign:"center",opacity:ctaIV?1:0,transform:ctaIV?"translateY(0)":"translateY(40px)",transition:"opacity 1.1s ease 0.4s,transform 1.1s cubic-bezier(0.16,1,0.3,1) 0.4s",padding:isMobile?"0 24px":"0 60px"}}>
            <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:7,color:A,marginBottom:28,transition:"color 0.9s ease"}}>YOUR LEGACY STARTS HERE</p>
            <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(56px,10vw,108px)",letterSpacing:isMobile?4:8,lineHeight:0.88,marginBottom:40}}>
              <span style={{color:"#fff"}}>WEAR YOUR</span><br/>
              <span style={{color:A,transition:"color 0.9s ease"}}>LEGACY.</span>
            </h2>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:"clamp(16px,2vw,20px)",color:"rgba(255,255,255,0.42)",marginBottom:52}}>Custom orders available. Financing on orders over $500.</p>
            <div style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap",marginBottom:32}}>
              <button className="btn-p"><span className="t" data-text="Shop Now">Shop Now</span></button>
              <button className="btn-s"><span className="t" data-text="Book Consultation">Book Consultation</span></button>
            </div>
            <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,letterSpacing:4,color:"rgba(255,255,255,0.18)"}}>FREE SHIPPING &nbsp;·&nbsp; 30-DAY RETURNS &nbsp;·&nbsp; LIFETIME SIZING</p>
          </div>
        </section>

        {/* ═══════════════════════════════════════════════════
            FOOTER
        ═══════════════════════════════════════════════════ */}
        <footer style={{background:"rgba(3,3,3,0.99)",padding:isMobile?"56px 20px 32px":isTablet?"72px 40px 36px":"100px 60px 40px",borderTop:`1px solid ${A}12`,transition:"border-color 0.9s ease"}}>
          <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":isTablet?"1fr 1fr 1fr":"2fr 1fr 1fr 1fr",gap:isMobile?32:isTablet?40:56,marginBottom:isMobile?40:72}}>
            <div>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:40,letterSpacing:14,background:`linear-gradient(135deg,#fff,${GL})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",marginBottom:16,transition:"color 0.9s ease"}}>LUXX</div>
              <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:15,color:"rgba(255,255,255,0.28)",lineHeight:1.72,maxWidth:220,marginBottom:28}}>Fine jewelry for those who refuse to choose between quality and value.</p>
              <div style={{display:"flex",gap:10}}>
                {["IG","TK","PIN"].map(s=>(<span key={s} className="nav-lnk" style={{border:"1px solid rgba(255,255,255,0.1)",padding:"9px 14px",fontSize:9,overflow:"visible"}}><span data-text={s}>{s}</span></span>))}
              </div>
            </div>
            {[{title:"Shop",links:["Chains","Watches","Rings","Custom Orders"]},{title:"Company",links:["Our Story","Craftsmanship","Careers","Press"]},{title:"Support",links:["FAQ","Shipping","Returns","Sizing Guide"]}].map(col=>(<div key={col.title}><p style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,letterSpacing:5,color:A,marginBottom:24,textTransform:"uppercase",transition:"color 0.9s ease"}}>{col.title}</p>{col.links.map(l=>(<span key={l} className="nav-lnk" style={{display:"block",marginBottom:14,fontSize:11}}><span data-text={l}>{l}</span></span>))}</div>))}
          </div>
          <div style={{borderTop:"1px solid rgba(201,168,76,0.07)",paddingTop:28,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
            <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,color:"rgba(255,255,255,0.14)",letterSpacing:2}}>© 2024 LUXX FINE JEWELRY. ALL RIGHTS RESERVED.</p>
            <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,color:"rgba(255,255,255,0.14)",letterSpacing:2}}>PRIVACY &nbsp;·&nbsp; TERMS &nbsp;·&nbsp; ACCESSIBILITY</p>
          </div>
        </footer>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Luxx/>);
</script>
</body>
</html>

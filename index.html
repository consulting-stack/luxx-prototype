<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LUXX — Fine Jewelry</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:auto;}
body{background:#080808;color:#fff;overflow-x:hidden;}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lenis/dist/lenis.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const G="#C9A84C",GL="#EDD98A",BG="#080808";

const CATS=[
  {num:"01",name:"Watches",desc:"Presidential. Royal Oak. GMT. Museum-quality movement. Studio-finished dial.",img:"https://source.unsplash.com/1f8wFF4YSXc/1920x1280"},
  {num:"02",name:"Chains",desc:"18K gold-plated Cuban, Figaro, Rope. 4mm to 12mm. Every length, every occasion.",img:"https://source.unsplash.com/WSKuvpbnN0E/1920x1280"},
  {num:"03",name:"Rings",desc:"Moissanite pavé. Signet. Bypass. 14K gold fill. Custom stone setting available.",img:"https://source.unsplash.com/S6DGTbwO7tw/1920x1280"},
  {num:"04",name:"Custom",desc:"Your vision, our craftsmanship. Commission from scratch. Starts at $299.",img:"https://source.unsplash.com/jT89dCHmF94/1920x1280"}
];
const QUOTES=[
  {q:"I've been to Tiffany's. The difference is I can actually afford to come back to Luxx.",name:"Marcus T.",loc:"Atlanta, GA",img:"https://source.unsplash.com/lwmy1afZq6M/1920x1280"},
  {q:"The chain looks like it costs three times what I paid. People stop me everywhere I go.",name:"Alicia R.",loc:"Houston, TX",img:"https://source.unsplash.com/-dxk924xNoY/1920x1280"},
  {q:"Bought the GMT for my husband's birthday. He thought I spent way more. That's the whole point.",name:"Jordan M.",loc:"Chicago, IL",img:"https://source.unsplash.com/WSKuvpbnN0E/1920x1280"}
];

// ── HOOKS ──────────────────────────────────────────────
function useInView(t=0.12){const ref=useRef(null);const[v,setV]=useState(false);useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setV(true);},{threshold:t});if(ref.current)o.observe(ref.current);return()=>o.disconnect();},[]);return[ref,v];}
function useBreak(){const[b,setB]=useState("desktop");useEffect(()=>{const fn=()=>setB(window.innerWidth<768?"mobile":window.innerWidth<1024?"tablet":"desktop");fn();window.addEventListener("resize",fn);return()=>window.removeEventListener("resize",fn);},[]);return b;}

// ── LOADING LINE ───────────────────────────────────────
function LoadingLine(){
  const[w,setW]=useState(0);const[op,setOp]=useState(1);
  useEffect(()=>{const t1=setTimeout(()=>setW(60),100);const t2=setTimeout(()=>setW(100),1800);const t3=setTimeout(()=>setOp(0),3000);return()=>[t1,t2,t3].forEach(clearTimeout);},[]);
  return <div style={{position:"fixed",top:0,left:0,right:0,height:2,zIndex:99999,pointerEvents:"none",opacity:op,transition:"opacity 0.5s ease"}}><div style={{height:"100%",width:`${w}%`,background:`linear-gradient(90deg,${G},${GL},${G})`,backgroundSize:"200%",transition:"width 2s cubic-bezier(0.4,0,0.2,1)",boxShadow:`0 0 12px ${G}80`,animation:"shimmer 2s ease infinite"}}/></div>;
}

// ── LOADER ─────────────────────────────────────────────
function Loader({onDone}){
  const[s,setS]=useState(0);
  useEffect(()=>{const t1=setTimeout(()=>setS(1),200);const t2=setTimeout(()=>setS(2),1200);const t3=setTimeout(()=>setS(3),2200);const t4=setTimeout(()=>onDone(),2800);return()=>[t1,t2,t3,t4].forEach(clearTimeout);},[]);
  return(<div style={{position:"fixed",inset:0,zIndex:9999,background:BG,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:s===3?0:1,transition:s===3?"opacity 0.8s ease":"none",pointerEvents:s===3?"none":"all"}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:72,letterSpacing:24,background:`linear-gradient(135deg,#fff,${GL},#fff)`,backgroundSize:"300%",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",opacity:s>=1?1:0,transform:s>=1?"translateY(0)":"translateY(14px)",transition:"opacity 0.8s ease 0.1s,transform 0.8s cubic-bezier(0.16,1,0.3,1) 0.1s",animation:s>=1?"shimmer 4s ease infinite":"none"}}>LUXX</div><div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:300,fontSize:9,letterSpacing:8,color:"rgba(255,255,255,0.3)",marginTop:10,opacity:s>=2?1:0,transition:"opacity 0.6s ease"}}>FINE JEWELRY</div></div>);
}

// ── GRAIN ──────────────────────────────────────────────
function Grain(){return <div style={{position:"fixed",inset:0,zIndex:999,pointerEvents:"none",opacity:0.032,backgroundImage:`url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")`,backgroundSize:"200px"}}/>;}

// ── CATEGORY ROW ───────────────────────────────────────
function CatRow({cat,i,ready}){
  const[hov,setHov]=useState(false);
  const[iv,setIv]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setIv(true);},{threshold:0.06});if(ref.current)o.observe(ref.current);return()=>o.disconnect();},[]);
  return(
    <div ref={ref} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{position:"relative",overflow:"hidden",borderBottom:"1px solid rgba(255,255,255,0.06)",cursor:"pointer",
        opacity:iv?1:0,transform:iv?"translateY(0)":"translateY(32px)",
        transition:`opacity 1s ease ${i*0.1}s,transform 1s cubic-bezier(0.16,1,0.3,1) ${i*0.1}s`}}>
      <div style={{position:"absolute",inset:0,backgroundImage:`url(${cat.img})`,backgroundSize:"cover",backgroundPosition:"center",
        opacity:hov?0.2:0,transition:"opacity 0.8s ease",filter:"brightness(0.8)"}}/>
      <div style={{position:"absolute",left:0,top:0,bottom:0,width:hov?3:0,background:G,transition:"width 0.4s ease"}}/>
      <div style={{position:"relative",zIndex:1,display:"flex",alignItems:"center",gap:40,padding:"56px 64px",flexWrap:"wrap"}}>
        <div style={{minWidth:260,maxWidth:400}}>
          <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:5,
            color:hov?G:"rgba(255,255,255,0.2)",marginBottom:14,transition:"color 0.4s ease"}}>{cat.num}</p>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:18,
            color:"rgba(255,255,255,0.4)",lineHeight:1.75}}> {cat.desc}</p>
        </div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(72px,9vw,136px)",letterSpacing:"0.05em",
          color:hov?G:"#fff",marginLeft:"auto",lineHeight:1,transition:"color 0.4s ease"}}>{cat.name}</div>
        <svg width="32" height="16" viewBox="0 0 32 16" fill="none"
          style={{flexShrink:0,opacity:hov?1:0.2,transform:hov?"translateX(5px)":"none",transition:"all 0.4s ease"}}>
          <path d="M0 8H30M24 2L30 8L24 14" stroke={hov?G:"white"} strokeWidth="1.5"/>
        </svg>
      </div>
    </div>
  );
}

// ── MAIN ───────────────────────────────────────────────
function Luxx(){
  const[loading,setLoading]=useState(true);
  const[tIdx,setTIdx]=useState(0);
  const bp=useBreak();
  const isMobile=bp==="mobile",isTablet=bp==="tablet";

  const[manRef,manIV]=useInView(0.08);
  const[catRef,catIV]=useInView(0.04);
  const[crRef,crIV]=useInView(0.1);
  const[tRef,tIV]=useInView(0.08);
  const[ctaRef,ctaIV]=useInView(0.12);

  // Lenis
  useEffect(()=>{
    if(typeof Lenis==="undefined")return;
    const l=new Lenis({duration:1.5,easing:t=>Math.min(1,1.001-Math.pow(2,-10*t)),smoothWheel:true,wheelMultiplier:0.78});
    function raf(t){l.raf(t);requestAnimationFrame(raf);}
    requestAnimationFrame(raf);
    return()=>l.destroy();
  },[]);

  // GSAP ScrollTrigger setup
  useEffect(()=>{
    if(loading||!window.gsap||!window.ScrollTrigger)return;
    const g=window.gsap;
    const ST=window.ScrollTrigger;
    g.registerPlugin(ST);

    // Hero entrance timeline
    const tl=g.timeline({delay:0.3});
    tl.from(".h-eyebrow",{y:20,opacity:0,duration:1.2,ease:"power3.out"})
      .from(".h-line1",{y:100,opacity:0,duration:1.5,ease:"power4.out"},"-=0.9")
      .from(".h-line2",{y:100,opacity:0,duration:1.5,ease:"power4.out"},"-=1.2")
      .from(".h-ctas",{y:24,opacity:0,duration:1.0,ease:"power3.out"},"-=0.8")
      .from(".h-scroll",{opacity:0,duration:0.8},"-=0.5");

    // Hero parallax — ScrollTrigger scrub
    g.to(".hero-watch-wrap",{
      yPercent:-14,ease:"none",
      scrollTrigger:{trigger:".hero-section",start:"top top",end:"bottom top",scrub:true}
    });
    g.to(".hero-luxx-depth",{
      yPercent:-38,opacity:0,ease:"none",
      scrollTrigger:{trigger:".hero-section",start:"top top",end:"65% top",scrub:true}
    });
    g.to(".hero-content",{
      yPercent:-8,ease:"none",
      scrollTrigger:{trigger:".hero-section",start:"top top",end:"bottom top",scrub:true}
    });

    // Scrub word reveals
    setTimeout(()=>{
      document.querySelectorAll("[data-scrub]").forEach(el=>{
        const words=el.querySelectorAll(".sw");
        if(!words.length)return;
        const dark=el.dataset.dark==="true";
        const gold=el.dataset.gold==="true";
        const endColor=gold?G:(dark?"#0a0a0a":"#ffffff");
        const startColor=dark?"rgba(10,10,10,0.08)":"rgba(255,255,255,0.07)";
        g.fromTo(words,{color:startColor},{
          color:endColor,stagger:0.12,ease:"none",
          scrollTrigger:{trigger:el,start:"top 78%",end:"bottom 48%",scrub:1.2}
        });
      });
      ST.refresh();
    },300);

    return()=>{ST.getAll().forEach(t=>t.kill());};
  },[loading]);

  // Testimonial auto-advance
  useEffect(()=>{
    if(!tIV)return;
    const t=setInterval(()=>setTIdx(i=>(i+1)%QUOTES.length),5000);
    return()=>clearInterval(t);
  },[tIV]);

  const ScrubWords=({text,dark=false,gold=false})=>{
    const words=text.split(" ");
    return(<span data-scrub="true" data-dark={dark.toString()} data-gold={gold.toString()}
      style={{display:"inline"}}>
      {words.map((w,i)=><span key={i} className="sw"
        style={{display:"inline",color:dark?"rgba(10,10,10,0.08)":"rgba(255,255,255,0.07)",
          marginRight:"0.28em"}}>{w}</span>)}
    </span>);
  };

  const pad=isMobile?"72px 24px":isTablet?"100px 40px":"160px 80px";

  return(<div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",background:BG,overflowX:"hidden"}}>
    <style>{`
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Bebas+Neue&family=Montserrat:wght@200;300;400;500&display=swap');
      *{box-sizing:border-box;}
      ::-webkit-scrollbar{width:2px;} ::-webkit-scrollbar-track{background:#080808;} ::-webkit-scrollbar-thumb{background:${G};}
      ::selection{background:${G}44;color:#fff;}
      .nav-l{font-family:'Montserrat',sans-serif;font-weight:300;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.45);text-transform:uppercase;cursor:pointer;position:relative;overflow:hidden;display:inline-block;}
      .nav-l span{display:block;transition:transform 0.55s cubic-bezier(0.16,1,0.3,1);}
      .nav-l span::before{content:attr(data-text);position:absolute;top:100%;left:0;width:100%;color:${G};}
      .nav-l:hover span{transform:translateY(-100%);}
      .btn-primary{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;
        border:1px solid ${G};color:#080808;background:${G};padding:18px 52px;cursor:pointer;position:relative;overflow:hidden;transition:background 0.5s,color 0.5s;}
      .btn-primary .t{display:block;transition:transform 0.55s cubic-bezier(0.16,1,0.3,1);}
      .btn-primary .t::before{content:attr(data-text);position:absolute;top:100%;left:0;width:100%;text-align:center;color:${G};}
      .btn-primary:hover .t{transform:translateY(-100%);} .btn-primary:hover{background:transparent;color:${G};}
      .btn-ghost{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;
        border:1px solid rgba(255,255,255,0.22);color:rgba(255,255,255,0.55);background:transparent;padding:18px 52px;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.5s,color 0.5s;}
      .btn-ghost .t{display:block;transition:transform 0.55s cubic-bezier(0.16,1,0.3,1);}
      .btn-ghost .t::before{content:attr(data-text);position:absolute;top:100%;left:0;width:100%;text-align:center;color:#fff;}
      .btn-ghost:hover .t{transform:translateY(-100%);} .btn-ghost:hover{border-color:rgba(255,255,255,0.6);color:#fff;}
      .btn-dark{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;
        border:1px solid #0a0a0a;color:#fff;background:#0a0a0a;padding:18px 52px;cursor:pointer;position:relative;overflow:hidden;transition:all 0.5s;}
      .btn-dark .t{display:block;transition:transform 0.55s cubic-bezier(0.16,1,0.3,1);}
      .btn-dark .t::before{content:attr(data-text);position:absolute;top:100%;left:0;width:100%;text-align:center;color:#0a0a0a;}
      .btn-dark:hover .t{transform:translateY(-100%);} .btn-dark:hover{background:transparent;color:#0a0a0a;border-color:#0a0a0a;}
      @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
      @keyframes marq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
      @keyframes floatW{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
      @keyframes ringPulse{0%,100%{border-color:rgba(201,168,76,0.08)}50%{border-color:rgba(201,168,76,0.3)}}
      @media(max-width:767px){.btn-primary,.btn-ghost,.btn-dark{padding:15px 24px !important;width:100%;max-width:260px;}}
    `}</style>

    <LoadingLine/>
    {loading&&<Loader onDone={()=>setLoading(false)}/>}
    <Grain/>

    {/* ══ NAV ══════════════════════════════════════════════ */}
    <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:1000,
      padding:isMobile?"14px 22px":isTablet?"20px 40px":"22px 64px",
      display:"flex",alignItems:"center",justifyContent:"space-between",
      background:"linear-gradient(to bottom,rgba(8,8,8,0.85),transparent)",
      opacity:loading?0:1,transition:"opacity 0.9s ease 0.4s",
      backdropFilter:"blur(1px)"}}>
      <div style={{display:isMobile?"none":"flex",gap:44}}>
        <span className="nav-l"><span data-text="Collections">Collections</span></span>
        <span className="nav-l"><span data-text="About">About</span></span>
      </div>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:isMobile?20:26,letterSpacing:isMobile?8:12,
        background:`linear-gradient(135deg,#fff 0%,${GL} 55%,#fff 100%)`,backgroundSize:"300%",
        WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",
        animation:"shimmer 6s ease infinite",
        position:isMobile?"static":"absolute",left:isMobile?"auto":"50%",transform:isMobile?"none":"translateX(-50%)"}}>LUXX</div>
      <button className="btn-primary" style={{padding:"9px 22px",fontSize:9,letterSpacing:2}}>
        <span className="t" data-text="Shop Now">Shop Now</span>
      </button>
    </nav>

    {/* ══ HERO ══════════════════════════════════════════════ */}
    <section className="hero-section" style={{height:"100vh",position:"relative",overflow:"hidden"}}>

      {/* Watch photo — full viewport */}
      <div className="hero-watch-wrap" style={{position:"absolute",inset:0,willChange:"transform"}}>
        <img src="https://source.unsplash.com/Ae3OHpJfngc/1920x1280" alt="Rolex Explorer"
          style={{width:"100%",height:"110%",objectFit:"cover",objectPosition:"center 35%",marginTop:"-5%"}}/>
      </div>

      {/* Graduated overlays */}
      <div style={{position:"absolute",inset:0,background:"rgba(8,8,8,0.38)",zIndex:1}}/>
      <div style={{position:"absolute",top:0,left:0,right:0,height:"35%",
        background:"linear-gradient(to bottom,rgba(8,8,8,0.82),transparent)",zIndex:2}}/>
      <div style={{position:"absolute",bottom:0,left:0,right:0,height:"32%",
        background:"linear-gradient(to top,rgba(8,8,8,0.9),transparent)",zIndex:2}}/>

      {/* LUXX depth wordmark — in the scene */}
      <div className="hero-luxx-depth" style={{
        position:"absolute",bottom:"10%",left:"50%",
        transform:"translateX(-50%)",
        zIndex:3,pointerEvents:"none",whiteSpace:"nowrap",
        fontFamily:"'Bebas Neue',sans-serif",
        fontSize:"clamp(140px,22vw,320px)",
        letterSpacing:"0.08em",
        WebkitTextFillColor:"transparent",
        WebkitTextStroke:`2px rgba(201,168,76,0.58)`,
        color:"transparent",lineHeight:1,willChange:"transform,opacity",
        textShadow:"none",
      }}>LUXX</div>

      {/* Hero content — anchored to top */}
      <div className="hero-content" style={{
        position:"absolute",top:isMobile?"18vh":"15vh",
        left:0,right:0,
        zIndex:4,textAlign:"center",
        padding:isMobile?"0 24px":"0 60px",
        willChange:"transform",
      }}>
        <p className="h-eyebrow" style={{
          fontFamily:"'Montserrat',sans-serif",fontWeight:300,
          fontSize:isMobile?8:9,letterSpacing:isMobile?5:9,
          color:G,marginBottom:isMobile?18:28,opacity:0,
        }}>EST. 2024 &nbsp;·&nbsp; FINE JEWELRY &nbsp;·&nbsp; JACKSON, MS</p>

        <div className="h-line1" style={{overflow:"visible",opacity:0}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",
            fontSize:`clamp(64px,${isMobile?"16vw":"13vw"},180px)`,
            letterSpacing:isMobile?3:6,lineHeight:0.85,
            color:"#fff",whiteSpace:"nowrap"}}>
            MUSEUM QUALITY.
          </div>
        </div>
        <div className="h-line2" style={{overflow:"visible",opacity:0,marginBottom:isMobile?36:52}}>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",
            fontSize:`clamp(64px,${isMobile?"16vw":"13vw"},180px)`,
            letterSpacing:isMobile?3:6,lineHeight:0.85,
            WebkitTextFillColor:"transparent",
            WebkitTextStroke:`2px ${G}`,
            color:"transparent",whiteSpace:"nowrap"}}>
            REAL&#8209;WORLD PRICES.
          </div>
        </div>
        <div className="h-ctas" style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap",opacity:0}}>
          <button className="btn-primary"><span className="t" data-text="Explore Collection">Explore Collection</span></button>
          <button className="btn-ghost"><span className="t" data-text="Our Story">Our Story</span></button>
        </div>
      </div>

      {/* Scroll indicator */}
      <div className="h-scroll" style={{position:"absolute",bottom:isMobile?20:36,left:"50%",
        transform:"translateX(-50%)",display:"flex",flexDirection:"column",alignItems:"center",gap:10,
        zIndex:4,opacity:0}}>
        <div style={{width:1,height:44,background:`linear-gradient(to bottom,${G},transparent)`,
          animation:"floatW 2.8s ease infinite"}}/>
        <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:7,letterSpacing:4,color:"rgba(255,255,255,0.3)"}}>SCROLL</span>
      </div>
    </section>

    {/* Marquee */}
    <div style={{overflow:"hidden",borderTop:`1px solid ${G}22`,borderBottom:`1px solid ${G}22`,
      padding:"14px 0",background:"rgba(8,8,8,0.95)"}}>
      <div style={{display:"flex",gap:64,whiteSpace:"nowrap",animation:"marq 28s linear infinite"}}>
        {[...Array(8)].map((_,i)=><span key={i} style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:5,color:G}}>
          Chains &nbsp;·&nbsp; Watches &nbsp;·&nbsp; Rings &nbsp;·&nbsp; Custom &nbsp;·&nbsp; Free Shipping &nbsp;·&nbsp;
        </span>)}
      </div>
    </div>

    {/* ══ MANIFESTO — LIGHT SECTION ══════════════════════════ */}
    <section ref={manRef} data-theme="light" style={{
      background:"#f7f4ef",
      padding:isMobile?"80px 24px 72px":isTablet?"120px 40px 100px":"180px 80px 160px",
      position:"relative",overflow:"hidden",
    }}>
      {/* Jewelry image — right side accent */}
      <div style={{
        position:isMobile?"relative":"absolute",
        right:isMobile?"auto":"0",top:isMobile?"auto":"0",bottom:isMobile?"auto":"0",
        width:isMobile?"100%":"38%",
        height:isMobile?260:"100%",
        overflow:"hidden",
        marginBottom:isMobile?48:0,
        opacity:manIV?1:0,
        transition:"opacity 1.4s ease 0.3s",
      }}>
        <img src="https://source.unsplash.com/_EdwR9meiUk/1920x1280" alt="" style={{
          width:"100%",height:"100%",objectFit:"cover",objectPosition:"center",
          filter:"brightness(0.92) saturate(0.95)",
        }}/>
        <div style={{position:"absolute",inset:0,
          background:isMobile?"linear-gradient(to bottom,transparent 50%,#f7f4ef 95%)":
            "linear-gradient(to right,#f7f4ef 0%,transparent 30%)"}}/>
      </div>

      <div style={{position:"relative",zIndex:1,maxWidth:isMobile?"100%":"58%"}}>
        <div style={{opacity:manIV?1:0,transform:manIV?"translateY(0)":"translateY(16px)",
          transition:"opacity 1s ease,transform 1s cubic-bezier(0.16,1,0.3,1)",marginBottom:36}}>
          <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:7,color:G}}>OUR PHILOSOPHY</span>
        </div>

        <div style={{fontFamily:"'Bebas Neue',sans-serif",
          fontSize:"clamp(52px,8vw,110px)",
          letterSpacing:3,lineHeight:0.87,marginBottom:40}}>
          <div style={{overflow:"hidden"}}><div style={{color:"#0a0a0a",transform:manIV?"translateY(0)":"translateY(105%)",transition:"transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.05s"}}>THIS ISN'T JUST</div></div>
          <div style={{overflow:"hidden"}}><div style={{color:G,transform:manIV?"translateY(0)":"translateY(105%)",transition:"transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s"}}>FINE JEWELRY.</div></div>
        </div>

        <div style={{width:manIV?48:0,height:1,background:"#0a0a0a",marginBottom:40,transition:"width 1.2s ease 0.5s"}}/>

        <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",
          fontSize:"clamp(19px,2.4vw,28px)",fontWeight:300,lineHeight:1.8,
          maxWidth:600,color:"rgba(10,10,10,0.75)",
          opacity:manIV?1:0,transition:"opacity 0.9s ease 0.7s"}}>
          <ScrubWords dark={true}
            text="It's about the statement you make when you walk into a room. The legacy you carry on your wrist. Fine jewelry has always belonged to everyone who understands its power — we built Luxx so the price tag finally agrees."/>
        </div>

        <div style={{marginTop:52,opacity:manIV?1:0,transition:"opacity 0.9s ease 1s",display:"flex",gap:14,flexWrap:"wrap"}}>
          <button className="btn-dark"><span className="t" data-text="Our Story">Our Story</span></button>
        </div>
      </div>
    </section>

    {/* ══ WHAT WE MAKE ══════════════════════════════════════ */}
    <section ref={catRef} style={{background:"rgba(6,6,6,0.98)"}}>
      <div style={{padding:isMobile?"64px 24px 40px":isTablet?"88px 40px 56px":"140px 80px 72px",
        borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",flexWrap:"wrap",gap:20}}>
          <div>
            <div style={{opacity:catIV?1:0,transform:catIV?"translateY(0)":"translateY(14px)",
              transition:"opacity 1s ease,transform 1s cubic-bezier(0.16,1,0.3,1)",marginBottom:16}}>
              <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:7,color:G}}>THE CATALOG</span>
            </div>
            <div style={{overflow:"hidden"}}><div style={{fontFamily:"'Bebas Neue',sans-serif",
              fontSize:"clamp(44px,6vw,82px)",letterSpacing:4,color:"#fff",
              transform:catIV?"translateY(0)":"translateY(105%)",
              transition:"transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.1s"}}>WHAT WE MAKE.</div></div>
          </div>
          <div style={{opacity:catIV?1:0,transition:"opacity 0.9s ease 0.5s"}}>
            <button className="btn-ghost" style={{padding:"12px 28px",fontSize:9}}>
              <span className="t" data-text="View All">View All</span>
            </button>
          </div>
        </div>
      </div>
      {CATS.map((c,i)=><CatRow key={c.name} cat={c} i={i} ready={catIV}/>)}
    </section>

    {/* ══ CRAFTSMANSHIP ════════════════════════════════════ */}
    <section ref={crRef} style={{
      display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",
      minHeight:isMobile?"auto":"84vh",
      background:"#080808",
      borderTop:"1px solid rgba(255,255,255,0.04)",
    }}>
      <div style={{position:"relative",overflow:"hidden",minHeight:isMobile?280:500}}>
        <img src="https://source.unsplash.com/trh2Luw30IQ/1920x1280" alt="" style={{
          width:"100%",height:"100%",objectFit:"cover",objectPosition:"center",
          filter:"brightness(0.52) saturate(0.85)",
          transform:crIV?"scale(1.0)":"scale(1.07)",
          transition:"transform 1.6s cubic-bezier(0.16,1,0.3,1)",
          position:"absolute",inset:0,
        }}/>
        <div style={{position:"absolute",inset:0,
          background:isMobile?
            "linear-gradient(to bottom,transparent 45%,rgba(8,8,8,0.92) 100%)":
            "linear-gradient(to right,transparent 45%,rgba(8,8,8,0.92) 100%)"}}/>
      </div>
      <div style={{padding:isMobile?"40px 24px 64px":isTablet?"64px 40px":"120px 80px 120px 64px",
        display:"flex",flexDirection:"column",justifyContent:"center"}}>
        <div style={{opacity:crIV?1:0,transform:crIV?"translateY(0)":"translateY(14px)",
          transition:"opacity 1s ease,transform 1s cubic-bezier(0.16,1,0.3,1)",marginBottom:28}}>
          <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:7,color:G}}>OUR CRAFT</span>
        </div>
        <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(44px,5.5vw,68px)",letterSpacing:3,lineHeight:0.88,marginBottom:4}}>
          {["ENGINEERED","WITHOUT","COMPROMISE."].map((w,i)=>(
            <div key={w} style={{overflow:"hidden"}}><div style={{
              color:i===2?G:"#fff",
              transform:crIV?"translateY(0)":"translateY(105%)",
              transition:`transform 1.4s cubic-bezier(0.16,1,0.3,1) ${0.08+i*0.14}s`}}>{w}</div></div>
          ))}
        </div>
        <div style={{width:crIV?48:0,height:1,background:G,margin:"28px 0",transition:"width 1.2s ease 0.55s"}}/>
        <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",
          fontSize:"clamp(17px,1.9vw,22px)",fontWeight:300,lineHeight:1.82,
          maxWidth:480,marginBottom:44,
          opacity:crIV?1:0,transition:"opacity 0.9s ease 0.7s"}}>
          <ScrubWords text="Every piece passes through artisan hands three times before it reaches yours. Same materials as the luxury houses — we just don't charge for the logo."/>
        </div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap",opacity:crIV?1:0,transition:"opacity 0.9s ease 0.9s"}}>
          {["14K Gold","18K Gold","Moissanite","Lab Diamond","925 Silver"].map(m=>(
            <span key={m} style={{
              fontFamily:"'Montserrat',sans-serif",fontSize:8,letterSpacing:3,
              border:`1px solid ${G}35`,color:"rgba(255,255,255,0.38)",
              padding:"8px 16px",cursor:"pointer",transition:"all 0.35s ease",
            }} onMouseEnter={e=>{e.target.style.borderColor=G;e.target.style.color=G;}}
                 onMouseLeave={e=>{e.target.style.borderColor=`${G}35`;e.target.style.color="rgba(255,255,255,0.38)";}}
            >{m}</span>
          ))}
        </div>
      </div>
    </section>

    {/* ══ TESTIMONIALS — FIND STYLE ═══════════════════════ */}
    <section ref={tRef} style={{
      background:"#f2f0ec",
      padding:isMobile?"72px 24px 80px":isTablet?"100px 40px 120px":"160px 80px 180px",
    }}>
      <div style={{maxWidth:1200,margin:"0 auto"}}>
        <div style={{marginBottom:isMobile?48:80}}>
          <div style={{opacity:tIV?1:0,transition:"opacity 1s ease",marginBottom:14}}>
            <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:7,color:G}}>WHAT THEY'RE SAYING</span>
          </div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(44px,6vw,80px)",letterSpacing:4,lineHeight:0.88}}>
            <div style={{overflow:"hidden"}}><div style={{color:"#0a0a0a",transform:tIV?"translateY(0)":"translateY(105%)",transition:"transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.05s"}}>DON'T TAKE</div></div>
            <div style={{overflow:"hidden"}}><div style={{color:G,transform:tIV?"translateY(0)":"translateY(105%)",transition:"transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.2s"}}>OUR WORD FOR IT.</div></div>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 1fr",gap:isMobile?40:80,alignItems:"start"}}>
          {/* Left photo */}
          <div style={{position:"relative",height:isMobile?260:520,overflow:"hidden",
            opacity:tIV?1:0,transition:"opacity 1.2s ease 0.3s"}}>
            <img src={QUOTES[tIdx].img} style={{
              width:"100%",height:"100%",objectFit:"cover",objectPosition:"center 20%",
              filter:"brightness(0.88) saturate(0.9)",
              transition:"opacity 0.6s ease",
            }} alt=""/>
          </div>
          {/* Right content */}
          <div style={{display:"flex",flexDirection:"column",justifyContent:"center",
            opacity:tIV?1:0,transition:"opacity 1.2s ease 0.4s"}}>
            <div style={{width:"100%",height:1,background:"rgba(10,10,10,0.1)",marginBottom:32}}/>
            {/* Numbered pagination */}
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:40}}>
              {QUOTES.map((_,i)=>(
                <button key={i} onClick={()=>setTIdx(i)} style={{
                  width:36,height:36,borderRadius:"50%",
                  border:`1px solid ${i===tIdx?G:"rgba(10,10,10,0.2)"}`,
                  background:i===tIdx?G:"transparent",
                  color:i===tIdx?"#fff":"rgba(10,10,10,0.38)",
                  fontFamily:"'Montserrat',sans-serif",fontSize:11,cursor:"pointer",
                  transition:"all 0.4s ease",
                }}>{i+1}</button>
              ))}
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:60,
                color:G,lineHeight:0.8,marginLeft:"auto",opacity:0.5}}>&#8220;</span>
            </div>
            <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",
              fontSize:"clamp(18px,2.2vw,24px)",color:"rgba(10,10,10,0.78)",
              lineHeight:1.75,marginBottom:40,minHeight:isMobile?80:110,
              transition:"opacity 0.5s ease"}}>
              {QUOTES[tIdx].q}
            </p>
            <div style={{width:"100%",height:1,background:"rgba(10,10,10,0.08)",marginBottom:24}}/>
            <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
              <div style={{width:28,height:1,background:G,flexShrink:0}}/>
              <span style={{fontFamily:"'Montserrat',sans-serif",fontWeight:400,
                fontSize:11,letterSpacing:3,color:"#0a0a0a"}}>{QUOTES[tIdx].name}</span>
              <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,
                color:"rgba(10,10,10,0.35)",letterSpacing:1}}>{QUOTES[tIdx].loc}</span>
              <span style={{color:G,marginLeft:"auto",letterSpacing:3,fontSize:13}}>★★★★★</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    {/* ══ CTA ══════════════════════════════════════════════ */}
    <section ref={ctaRef} style={{
      minHeight:"88vh",display:"flex",alignItems:"center",justifyContent:"center",
      position:"relative",overflow:"hidden",background:"#050505",
    }}>
      {/* Background image — ring box */}
      <div style={{position:"absolute",inset:0,zIndex:0}}>
        <img src="https://source.unsplash.com/jT89dCHmF94/1920x1280" alt="" style={{
          width:"100%",height:"100%",objectFit:"cover",objectPosition:"center",
          filter:"brightness(0.2) saturate(0.6)",
        }}/>
      </div>
      <div style={{position:"absolute",inset:0,background:"rgba(5,5,5,0.62)",zIndex:1}}/>

      {/* Rings */}
      {(isMobile?[140,240,320]:[440,640,820]).map((sz,ri)=>(
        <div key={sz} style={{
          position:"absolute",top:"50%",left:"50%",
          transform:"translate(-50%,-50%)",
          width:ctaIV?sz:0,height:ctaIV?sz:0,
          border:`1px solid ${G}${ri===0?"30":ri===1?"18":"0c"}`,
          borderRadius:"50%",
          transition:`width ${1.3+ri*0.18}s cubic-bezier(0.16,1,0.3,1) ${ri*0.13}s,height ${1.3+ri*0.18}s cubic-bezier(0.16,1,0.3,1) ${ri*0.13}s`,
          animation:ri===0?"ringPulse 4.5s ease infinite":"none",
          zIndex:2,
        }}/>
      ))}

      <div style={{position:"relative",zIndex:3,textAlign:"center",
        opacity:ctaIV?1:0,transform:ctaIV?"translateY(0)":"translateY(36px)",
        transition:"opacity 1.1s ease 0.4s,transform 1.1s cubic-bezier(0.16,1,0.3,1) 0.4s",
        padding:isMobile?"0 24px":"0 60px"}}>
        <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:8,
          color:G,marginBottom:28}}>YOUR LEGACY STARTS HERE</p>
        <h2 style={{fontFamily:"'Bebas Neue',sans-serif",
          fontSize:`clamp(56px,${isMobile?"14vw":"10vw"},112px)`,
          letterSpacing:isMobile?4:8,lineHeight:0.87,marginBottom:44}}>
          <span style={{color:"#fff"}}>WEAR YOUR</span><br/>
          <span style={{color:G}}>LEGACY.</span>
        </h2>
        <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",
          fontSize:"clamp(16px,2vw,21px)",color:"rgba(255,255,255,0.45)",marginBottom:52}}>
          Custom orders welcome. Financing available on orders over $500.
        </p>
        <div style={{display:"flex",gap:14,justifyContent:"center",flexWrap:"wrap",marginBottom:32}}>
          <button className="btn-primary"><span className="t" data-text="Shop Now">Shop Now</span></button>
          <button className="btn-ghost"><span className="t" data-text="Book Consultation">Book Consultation</span></button>
        </div>
        <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,letterSpacing:4,color:"rgba(255,255,255,0.18)"}}>
          FREE SHIPPING &nbsp;·&nbsp; 30-DAY RETURNS &nbsp;·&nbsp; LIFETIME SIZING
        </p>
      </div>
    </section>

    {/* ══ FOOTER ═══════════════════════════════════════════ */}
    <footer style={{
      background:"#030303",
      padding:isMobile?"56px 24px 32px":isTablet?"72px 40px 36px":"100px 80px 44px",
      borderTop:`1px solid ${G}14`,
    }}>
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":isTablet?"1fr 1fr 1fr":"2fr 1fr 1fr 1fr",
        gap:isMobile?32:48,marginBottom:isMobile?40:72}}>
        <div>
          <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:14,
            background:`linear-gradient(135deg,#fff,${GL})`,WebkitBackgroundClip:"text",
            WebkitTextFillColor:"transparent",marginBottom:14}}>LUXX</div>
          <p style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:15,
            color:"rgba(255,255,255,0.28)",lineHeight:1.72,maxWidth:210,marginBottom:28}}>
            Fine jewelry for those who refuse to choose between quality and value.
          </p>
          <div style={{display:"flex",gap:10}}>
            {["IG","TK","PIN"].map(s=>(
              <span key={s} className="nav-l" style={{border:"1px solid rgba(255,255,255,0.1)",padding:"9px 14px",fontSize:9}}>
                <span data-text={s}>{s}</span>
              </span>
            ))}
          </div>
        </div>
        {[{title:"Shop",links:["Chains","Watches","Rings","Custom Orders"]},
           {title:"Company",links:["Our Story","Craftsmanship","Careers","Press"]},
           {title:"Support",links:["FAQ","Shipping","Returns","Sizing Guide"]}
        ].map(col=>(
          <div key={col.title}>
            <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,letterSpacing:5,color:G,
              marginBottom:22,textTransform:"uppercase"}}>{col.title}</p>
            {col.links.map(l=>(
              <span key={l} className="nav-l" style={{display:"block",marginBottom:14,fontSize:11}}>
                <span data-text={l}>{l}</span>
              </span>
            ))}
          </div>
        ))}
      </div>
      <div style={{borderTop:"1px solid rgba(201,168,76,0.07)",paddingTop:28,
        display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
        <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,color:"rgba(255,255,255,0.14)",letterSpacing:2}}>
          © 2024 LUXX FINE JEWELRY. ALL RIGHTS RESERVED.
        </p>
        <p style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,color:"rgba(255,255,255,0.14)",letterSpacing:2}}>
          PRIVACY &nbsp;·&nbsp; TERMS
        </p>
      </div>
    </footer>

  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<Luxx/>);
</script>
</body>
</html>

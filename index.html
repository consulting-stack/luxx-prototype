<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="LUXX Fine Jewelry — Museum quality. Real-world prices." />
  <title>LUXX Fine Jewelry</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{background:#070707;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
    #root{min-height:100vh;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const BG="#070707",G="#C9A84C",GL="#EDD98A";
    const WATCH_IMAGES=["https://res.cloudinary.com/djzwhvq8s/image/upload/v1778131054/kling_20260507_%E4%BD%9C%E5%93%81_Luxury_pro_3300_1_ykilvz.jpg","https://res.cloudinary.com/djzwhvq8s/image/upload/v1778131024/kling_20260507_%E4%BD%9C%E5%93%81_Luxury_pro_3300_0_1_p3t9j7.jpg","https://res.cloudinary.com/djzwhvq8s/image/upload/v1778131060/kling_20260507_%E4%BD%9C%E5%93%81_Luxury_pro_3300_1_1_lssrjs.jpg"];
    const WATCH_LABELS=["10 : 10","02 : 00","08 : 20"];
    const WATCH_NAMES=["Rolex Day-Date","AP Royal Oak Gold","AP Royal Oak Dark"];
    const WATCH_ACCENTS=["#C9A84C","#B8965A","#4A7A9B"];
    const FEATURED=[{name:"Sovereign Cuban",tag:"BESTSELLER",desc:"18K gold-plated. 6mm. 24 inches.",price:"$349",img:"https://images.unsplash.com/photo-1611652022419-a9419f74343d?w=800&q=90&fit=crop"},{name:"Noir GMT",tag:"NEW ARRIVAL",desc:"All-black case. Gold crown. 42mm.",price:"$529",img:"https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=800&q=90&fit=crop"},{name:"Empire Signet",tag:"LIMITED",desc:"Moissanite pavé. 14K gold fill.",price:"$279",img:"https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=800&q=90&fit=crop"}];
    const TESTIMONIALS=[{quote:"I've been to Tiffany's. I've been to Luxx. The difference is I can actually afford to come back to Luxx.",name:"Marcus T.",location:"Atlanta, GA"},{quote:"The chain looks like it costs three times what I paid. People stop me everywhere I go.",name:"Alicia R.",location:"Houston, TX"},{quote:"Bought the GMT for my husband's birthday. He thought I spent way more. That's the whole point.",name:"Jordan M.",location:"Chicago, IL"}];
    const STATS=[{num:500,suffix:"+",label:"Pieces Crafted"},{num:4.9,suffix:"★",label:"Average Rating",decimal:true},{num:10,suffix:"+",label:"Years of Craft"},{num:100,suffix:"%",label:"Satisfaction Guaranteed"}];

    function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
    function lerpHex(h1,h2,t){const a=hexToRgb(h1),b=hexToRgb(h2);return `rgb(${Math.round(a.r+(b.r-a.r)*t)},${Math.round(a.g+(b.g-a.g)*t)},${Math.round(a.b+(b.b-a.b)*t)})`;}
    function getAccent(p){const n=WATCH_ACCENTS.length,fi=p*(n-1),i=Math.min(n-2,Math.floor(fi));return lerpHex(WATCH_ACCENTS[i],WATCH_ACCENTS[i+1],fi-i);}
    function getBgOpacity(i,p){const n=WATCH_IMAGES.length,seg=1/n,start=i*seg,end=(i+1)*seg,fade=seg*0.35;if(i===0&&p<=end-fade)return 1;if(i===0&&p<=end)return 1-(p-(end-fade))/fade;if(i===0)return 0;if(i===n-1&&p>=start)return Math.min(1,(p-start)/fade);if(i===n-1)return 0;if(p<start)return 0;if(p<start+fade)return(p-start)/fade;if(p<=end-fade)return 1;if(p<=end)return 1-(p-(end-fade))/fade;return 0;}
    function getCurrentWatchIdx(p){return Math.min(WATCH_IMAGES.length-1,Math.floor(p*WATCH_IMAGES.length));}

    function useBgProgress(){const[p,setP]=useState(0);const raf=useRef(null);useEffect(()=>{const fn=()=>{const max=document.documentElement.scrollHeight-window.innerHeight;setP(max>0?Math.max(0,Math.min(1,window.scrollY/max)):0);};const onScroll=()=>{if(raf.current)cancelAnimationFrame(raf.current);raf.current=requestAnimationFrame(fn);};window.addEventListener("scroll",onScroll,{passive:true});fn();return()=>{window.removeEventListener("scroll",onScroll);if(raf.current)cancelAnimationFrame(raf.current);};},[]);return p;}
    function useScrollY(){const[y,setY]=useState(0);useEffect(()=>{const fn=()=>setY(window.scrollY);window.addEventListener("scroll",fn,{passive:true});return()=>window.removeEventListener("scroll",fn);},[]);return y;}
    function useInView(threshold=0.15){const ref=useRef(null);const[inView,setInView]=useState(false);useEffect(()=>{const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setInView(true);},{threshold});if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();},[]);return[ref,inView];}
    function useCounter(target,inView,duration=1800,decimal=false){const[val,setVal]=useState(0);useEffect(()=>{if(!inView)return;const steps=duration/16,inc=target/steps;let cur=0;const t=setInterval(()=>{cur+=inc;if(cur>=target){setVal(target);clearInterval(t);return;}setVal(decimal?Math.round(cur*10)/10:Math.floor(cur));},16);return()=>clearInterval(t);},[inView,target]);return val;}
    function useBreakpoint(){const[bp,setBp]=useState("desktop");useEffect(()=>{const fn=()=>{const w=window.innerWidth;setBp(w<768?"mobile":w<1024?"tablet":"desktop");};fn();window.addEventListener("resize",fn);return()=>window.removeEventListener("resize",fn);},[]);return bp;}

    // ── 3D RING ──────────────────────────────────────────
    function Ring3D({inView}){
      const mountRef=useRef(null);
      const sceneRef=useRef(null);
      useEffect(()=>{
        if(!inView||!mountRef.current||sceneRef.current)return;
        const THREE=window.THREE;
        const container=mountRef.current;
        const W=container.clientWidth;
        const H=Math.min(500,window.innerHeight*0.6);
        const scene=new THREE.Scene();
        const camera=new THREE.PerspectiveCamera(45,W/H,0.1,100);
        camera.position.set(0,0.4,5);
        const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
        renderer.setSize(W,H);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
        renderer.toneMapping=THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure=1.4;
        renderer.shadowMap.enabled=true;
        container.appendChild(renderer.domElement);
        renderer.domElement.style.borderRadius="2px";
        // Lights
        scene.add(new THREE.AmbientLight(0xffffff,0.6));
        const key=new THREE.SpotLight(0xfff8e7,3,30,Math.PI*0.25,0.5,1);
        key.position.set(6,8,6);key.castShadow=true;scene.add(key);
        const fill=new THREE.PointLight(0xC9A84C,2.5,20);
        fill.position.set(-5,3,4);scene.add(fill);
        scene.add(Object.assign(new THREE.PointLight(0xffffff,1.5,20),{position:{x:0,y:-4,z:-6}}));
        scene.add(Object.assign(new THREE.DirectionalLight(0xfff5cc,1.2),{position:{x:0,y:10,z:2}}));
        // Geometry
        const group=new THREE.Group();scene.add(group);
        const goldMat=new THREE.MeshStandardMaterial({color:new THREE.Color(0xC9A84C),metalness:1,roughness:0.08});
        const ring=new THREE.Mesh(new THREE.TorusGeometry(1,0.175,48,128),goldMat);
        ring.castShadow=true;group.add(ring);
        const bezel=new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.18,0.12,32),goldMat);
        bezel.position.set(0,1,0);group.add(bezel);
        const diamond=new THREE.Mesh(new THREE.OctahedronGeometry(0.32,0),new THREE.MeshPhysicalMaterial({color:new THREE.Color(0xffffff),metalness:0,roughness:0,transmission:0.95,thickness:0.6,clearcoat:1,clearcoatRoughness:0,ior:2.42,transparent:true,opacity:1}));
        diamond.position.set(0,1.32,0);diamond.scale.set(0.9,1.2,0.9);diamond.castShadow=true;group.add(diamond);
        const shadow=new THREE.Mesh(new THREE.PlaneGeometry(8,8),new THREE.ShadowMaterial({opacity:0.25}));
        shadow.rotation.x=-Math.PI/2;shadow.position.y=-1.6;shadow.receiveShadow=true;scene.add(shadow);
        // Controls
        let drag=false,lx=0,ly=0,ry=0,rx=0.18;
        const md=e=>{drag=true;lx=e.clientX;ly=e.clientY;renderer.domElement.style.cursor="grabbing";};
        const mm=e=>{if(!drag)return;ry+=(e.clientX-lx)*0.012;rx+=((e.clientY-ly)*0.012);rx=Math.max(-0.9,Math.min(0.9,rx));lx=e.clientX;ly=e.clientY;};
        const mu=()=>{drag=false;renderer.domElement.style.cursor="grab";};
        const ts=e=>{if(e.touches.length!==1)return;lx=e.touches[0].clientX;ly=e.touches[0].clientY;drag=true;};
        const tm=e=>{if(!drag||e.touches.length!==1)return;ry+=(e.touches[0].clientX-lx)*0.012;rx+=((e.touches[0].clientY-ly)*0.012);rx=Math.max(-0.9,Math.min(0.9,rx));lx=e.touches[0].clientX;ly=e.touches[0].clientY;};
        renderer.domElement.addEventListener("mousedown",md);
        window.addEventListener("mousemove",mm);
        window.addEventListener("mouseup",mu);
        renderer.domElement.addEventListener("touchstart",ts,{passive:true});
        renderer.domElement.addEventListener("touchmove",tm,{passive:true});
        renderer.domElement.addEventListener("touchend",()=>{drag=false;});
        renderer.domElement.style.cursor="grab";
        const clock=new THREE.Clock();let id;
        const animate=()=>{
          id=requestAnimationFrame(animate);
          const dt=clock.getDelta(),el=clock.getElapsedTime();
          if(!drag)ry+=dt*0.28;
          group.rotation.y=ry;group.rotation.x=rx;
          diamond.rotation.y=el*0.6;
          group.position.y=Math.sin(el*0.8)*0.06;
          fill.position.x=Math.sin(el*0.5)*5;fill.position.z=Math.cos(el*0.5)*5;
          renderer.render(scene,camera);
        };
        animate();
        const onR=()=>{if(!container)return;const w=container.clientWidth,h=Math.min(500,window.innerHeight*0.6);camera.aspect=w/h;camera.updateProjectionMatrix();renderer.setSize(w,h);};
        window.addEventListener("resize",onR);
        sceneRef.current={cleanup:()=>{
          cancelAnimationFrame(id);
          renderer.domElement.removeEventListener("mousedown",md);
          window.removeEventListener("mousemove",mm);window.removeEventListener("mouseup",mu);
          renderer.domElement.removeEventListener("touchstart",ts);renderer.domElement.removeEventListener("touchmove",tm);
          window.removeEventListener("resize",onR);
          if(container.contains(renderer.domElement))container.removeChild(renderer.domElement);
          renderer.dispose();
        }};
        return()=>{if(sceneRef.current){sceneRef.current.cleanup();sceneRef.current=null;}};
      },[inView]);
      return <div ref={mountRef} style={{width:"100%",height:"500px",position:"relative",overflow:"hidden"}}/>;
    }

    // ── UI COMPONENTS ────────────────────────────────────
    function Loader({onDone}){const[p,setP]=useState(0);useEffect(()=>{const t1=setTimeout(()=>setP(1),300),t2=setTimeout(()=>setP(2),1200),t3=setTimeout(()=>setP(3),2200),t4=setTimeout(()=>onDone(),2800);return()=>[t1,t2,t3,t4].forEach(clearTimeout);},[]);return(<div style={{position:"fixed",inset:0,zIndex:9999,background:BG,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:p===3?0:1,transition:p===3?"opacity 0.7s ease":"none",pointerEvents:p===3?"none":"all"}}><div style={{width:1,height:p>=1?88:0,background:`linear-gradient(to bottom,transparent,${G})`,transition:"height 0.9s cubic-bezier(0.16,1,0.3,1)",marginBottom:36}}/><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:88,letterSpacing:30,background:`linear-gradient(135deg,#fff 0%,${GL} 50%,#fff 100%)`,backgroundSize:"300% 100%",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",opacity:p>=1?1:0,transform:p>=1?"translateY(0)":"translateY(20px)",transition:"opacity 0.8s ease 0.2s,transform 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s",animation:p>=1?"goldShimmer 3s ease infinite":"none"}}>LUXX</div><div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:300,fontSize:10,letterSpacing:7,color:"rgba(255,255,255,0.35)",marginTop:14,opacity:p>=2?1:0,transition:"opacity 0.6s ease"}}>FINE JEWELRY</div><div style={{width:1,height:p>=2?88:0,background:`linear-gradient(to bottom,${G},transparent)`,transition:"height 0.9s cubic-bezier(0.16,1,0.3,1)",marginTop:36}}/></div>);}
    function Grain(){return <div style={{position:"fixed",inset:0,zIndex:997,pointerEvents:"none",opacity:0.04,backgroundImage:`url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")`,backgroundRepeat:"repeat",backgroundSize:"200px 200px"}}/>;}
    function FadeUp({children,inView,delay=0,y=36}){return <div style={{opacity:inView?1:0,transform:inView?"translateY(0)":`translateY(${y}px)`,transition:`opacity 0.9s ease ${delay}s,transform 0.9s cubic-bezier(0.16,1,0.3,1) ${delay}s`}}>{children}</div>;}
    function SlideUp({children,inView,delay=0}){return <div style={{overflow:"hidden"}}><div style={{transform:inView?"translateY(0)":"translateY(105%)",transition:`transform 1s cubic-bezier(0.16,1,0.3,1) ${delay}s`}}>{children}</div></div>;}
    function StatCard({num,suffix,label,inView,decimal}){const c=useCounter(num,inView,1800,decimal);return(<div style={{textAlign:"center"}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(52px,5.5vw,76px)",letterSpacing:4,lineHeight:1,background:`linear-gradient(135deg,${G} 0%,${GL} 60%,${G} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{decimal?c.toFixed(1):c}{suffix}</div><div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:300,fontSize:9,letterSpacing:4,color:"rgba(255,255,255,0.38)",marginTop:10,textTransform:"uppercase"}}>{label}</div></div>);}
    function WatchIndicator({bgProgress,accent,isMobile}){const idx=getCurrentWatchIdx(bgProgress);return(<div style={{position:"fixed",bottom:isMobile?16:40,right:isMobile?12:48,zIndex:100,textAlign:"right",pointerEvents:"none"}}><div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,marginBottom:16}}>{WATCH_IMAGES.map((_,i)=>{const a=i===idx,past=i<idx;return(<div key={i} style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,letterSpacing:3,color:a?accent:"rgba(255,255,255,0.2)",transition:"color 0.6s ease",display:isMobile?"none":"inline"}}>{WATCH_NAMES[i]}</span><div style={{width:a?24:6,height:2,background:a?accent:past?`${G}60`:"rgba(255,255,255,0.15)",borderRadius:2,transition:"all 0.5s ease"}}/></div>);})}</div><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:isMobile?18:28,letterSpacing:isMobile?2:4,color:accent,transition:"color 0.8s ease",lineHeight:1}}>{WATCH_LABELS[idx]}</div><div style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,letterSpacing:3,color:"rgba(255,255,255,0.3)",marginTop:4}}>CURRENT PIECE</div></div>);}

    // ── MAIN APP ─────────────────────────────────────────
    function Luxx(){
      const[loading,setLoading]=useState(true);
      const bgP=useBgProgress(),scrollY=useScrollY(),bp=useBreakpoint();
      const isMobile=bp==="mobile",isTablet=bp==="tablet";
      const accent=getAccent(bgP);
      const[heroRef,heroIV]=useInView(0.05);
      const[posRef,posIV]=useInView(0.2);
      const[statsRef,statsIV]=useInView(0.3);
      const[jewelRef,jewelIV]=useInView(0.1);
      const[featRef,featIV]=useInView(0.1);
      const[craftRef,craftIV]=useInView(0.2);
      const[testiRef,testiIV]=useInView(0.15);
      const[ctaRef,ctaIV]=useInView(0.2);

      return(
        <div style={{background:BG,color:"#fff",fontFamily:"'Cormorant Garamond',Georgia,serif",overflowX:"hidden"}}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=Montserrat:wght@200;300;400;500&display=swap');
            *{box-sizing:border-box;margin:0;padding:0;}
            ::-webkit-scrollbar{width:2px;} ::-webkit-scrollbar-track{background:${BG};} ::-webkit-scrollbar-thumb{background:${G};}
            ::selection{background:${G}44;color:#fff;} a{text-decoration:none;}
            .nav-link{font-family:'Montserrat',sans-serif;font-weight:300;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.5);text-transform:uppercase;transition:color 0.3s;}
            .nav-link:hover{color:${G};}
            .btn-gold{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;border:1px solid ${G};color:${G};background:transparent;padding:13px 32px;cursor:pointer;transition:all 0.35s ease;}
            .btn-gold:hover{background:${G};color:#000;}
            .btn-fill{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;border:1px solid ${G};color:#000;background:${G};padding:16px 52px;cursor:pointer;transition:all 0.35s ease;}
            .btn-fill:hover{background:transparent;color:${G};}
            .feat-wrap:hover .feat-img{transform:scale(1.07);} .feat-img{transition:transform 0.9s cubic-bezier(0.16,1,0.3,1);}
            .testi-card{border:1px solid rgba(201,168,76,0.12);padding:40px 36px;transition:border-color 0.4s,background 0.4s;background:rgba(7,7,7,0.7);}
            .testi-card:hover{border-color:rgba(201,168,76,0.35);background:rgba(7,7,7,0.85);}
            .mat-pill{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:3px;border:1px solid rgba(201,168,76,0.3);color:rgba(255,255,255,0.45);padding:9px 18px;text-transform:uppercase;transition:all 0.3s;}
            .mat-pill:hover{border-color:${G};color:${G};}
            @keyframes goldShimmer{0%{background-position:-200% center}100%{background-position:200% center}}
            @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
            @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}
            @keyframes ringPulse{0%,100%{border-color:rgba(201,168,76,0.08)}50%{border-color:rgba(201,168,76,0.3)}}
            @media(max-width:767px){.btn-fill{padding:14px 28px !important;width:100%;max-width:260px;}.btn-gold{padding:12px 20px !important;width:100%;max-width:260px;}.testi-card{padding:28px 18px !important;}.mat-pill{padding:7px 11px !important;font-size:8px !important;}}
            @media(min-width:768px) and (max-width:1023px){.btn-fill{padding:15px 40px !important;}}
          `}</style>

          {loading&&<Loader onDone={()=>setLoading(false)}/>}
          <Grain/>

          {/* Fixed bg */}
          <div style={{position:"fixed",inset:0,zIndex:0,overflow:"hidden"}}>
            {WATCH_IMAGES.map((src,i)=>(<div key={i} style={{position:"absolute",inset:0,backgroundImage:`url(${src})`,backgroundSize:"cover",backgroundPosition:"center",opacity:getBgOpacity(i,bgP),transform:isMobile?"scale(1)":`translateY(${(bgP-(i+0.5)/WATCH_IMAGES.length)*-80}px) scale(1.08)`,transition:"opacity 1s ease",willChange:"opacity,transform"}}/>))}
            <div style={{position:"absolute",inset:0,background:"rgba(7,7,7,0.55)"}}/>
            <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at center,transparent 40%,rgba(7,7,7,0.7) 100%)"}}/>
          </div>

          {!loading&&<WatchIndicator bgProgress={bgP} accent={accent} isMobile={isMobile}/>}

          {/* Nav */}
          <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:1000,padding:isMobile?"14px 20px":isTablet?"20px 40px":"22px 60px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"linear-gradient(to bottom,rgba(7,7,7,0.9),transparent)",opacity:loading?0:1,transition:"opacity 0.8s ease 0.4s"}}>
            <div style={{display:isMobile?"none":"flex",gap:44}}>
              <a href="#" className="nav-link">Collections</a>
              <a href="#" className="nav-link">About</a>
            </div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:isMobile?22:30,letterSpacing:isMobile?7:12,background:`linear-gradient(135deg,#fff 0%,${GL} 60%,#fff 100%)`,backgroundSize:"300% 100%",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",animation:"goldShimmer 5s ease infinite"}}>LUXX</div>
            <div style={{display:"flex",gap:32,alignItems:"center"}}>
              <a href="#" className="nav-link" style={{display:isMobile?"none":"inline"}}>Contact</a>
              <a href="#" className="nav-link" style={{border:`1px solid ${G}55`,padding:isMobile?"7px 14px":"9px 22px",color:G,fontSize:isMobile?9:10}}>Shop Now</a>
            </div>
          </nav>

          <div style={{position:"relative",zIndex:2}}>

            {/* HERO */}
            <section ref={heroRef} style={{height:"100vh",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
              <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 60%,transparent 20%,rgba(7,7,7,0.5) 80%)"}}/>
              <div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:1,height:heroIV?160:0,background:`linear-gradient(to bottom,transparent,${G},transparent)`,transition:"height 1.4s cubic-bezier(0.16,1,0.3,1) 0.9s"}}/>
              <div style={{position:"relative",textAlign:"center",padding:"0 24px"}}>
                <div style={{opacity:heroIV?1:0,transition:"opacity 0.8s ease 1s",fontFamily:"'Montserrat',sans-serif",fontWeight:300,fontSize:9,letterSpacing:isMobile?4:8,color:G,marginBottom:isMobile?16:28}}>EST. 2024 &nbsp;·&nbsp; FINE JEWELRY &nbsp;·&nbsp; JACKSON, MS</div>

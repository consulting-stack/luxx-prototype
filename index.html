<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <meta name="description" content="LUXX Fine Jewelry — Museum quality. Real-world prices."/>
  <title>LUXX Fine Jewelry</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{background:#070707;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
    #root{min-height:100vh;}
  </style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback}=React;
const BG="#070707",G="#C9A84C",GL="#EDD98A";

const WATCH_IMAGES=[
  "https://res.cloudinary.com/djzwhvq8s/image/upload/v1778131054/kling_20260507_%E4%BD%9C%E5%93%81_Luxury_pro_3300_1_ykilvz.jpg",
  "https://res.cloudinary.com/djzwhvq8s/image/upload/v1778131024/kling_20260507_%E4%BD%9C%E5%93%81_Luxury_pro_3300_0_1_p3t9j7.jpg",
  "https://res.cloudinary.com/djzwhvq8s/image/upload/v1778131060/kling_20260507_%E4%BD%9C%E5%93%81_Luxury_pro_3300_1_1_lssrjs.jpg"
];

const SHOWCASE=[
  {accent:"#C9A84C",accentRgb:"201,168,76",name:"Rolex Day-Date",collection:"Presidential Collection",specs:"18K Yellow Gold · President Bracelet",ref:"228238",time:"10 : 10"},
  {accent:"#C8986A",accentRgb:"200,152,106",name:"AP Royal Oak",collection:"Extra-Thin Rose Gold",specs:"18K Rose Gold · Grande Tapisserie",ref:"15202OR",time:"02 : 00"},
  {accent:"#4A7A9B",accentRgb:"74,122,155",name:"AP Royal Oak",collection:"Offshore Storm Edition",specs:"Black Ceramic · Forged Carbon",ref:"26405CE",time:"08 : 20"}
];

const FEATURED=[
  {name:"Sovereign Cuban",tag:"BESTSELLER",desc:"18K gold-plated. 6mm. 24 inches.",price:"$349",img:"https://images.unsplash.com/photo-1611652022419-a9419f74343d?w=800&q=90&fit=crop"},
  {name:"Noir GMT",tag:"NEW ARRIVAL",desc:"All-black case. Gold crown. 42mm.",price:"$529",img:"https://images.unsplash.com/photo-1547996160-81dfa63595aa?w=800&q=90&fit=crop"},
  {name:"Empire Signet",tag:"LIMITED",desc:"Moissanite pavé. 14K gold fill.",price:"$279",img:"https://images.unsplash.com/photo-1515377905703-c4788e51af15?w=800&q=90&fit=crop"}
];

const TESTIMONIALS=[
  {quote:"I've been to Tiffany's. I've been to Luxx. The difference is I can actually afford to come back to Luxx.",name:"Marcus T.",location:"Atlanta, GA"},
  {quote:"The chain looks like it costs three times what I paid. People stop me everywhere I go.",name:"Alicia R.",location:"Houston, TX"},
  {quote:"Bought the GMT for my husband's birthday. He thought I spent way more. That's the whole point.",name:"Jordan M.",location:"Chicago, IL"}
];

const STATS=[
  {num:500,suffix:"+",label:"Pieces Crafted"},
  {num:4.9,suffix:"★",label:"Average Rating",decimal:true},
  {num:10,suffix:"+",label:"Years of Craft"},
  {num:100,suffix:"%",label:"Satisfaction Guaranteed"}
];

function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
function lerpHex(h1,h2,t){const a=hexToRgb(h1),b=hexToRgb(h2);return`rgb(${Math.round(a.r+(b.r-a.r)*t)},${Math.round(a.g+(b.g-a.g)*t)},${Math.round(a.b+(b.b-a.b)*t)})`;}
function getBgOpacity(i,p){const n=WATCH_IMAGES.length,seg=1/n,start=i*seg,end=(i+1)*seg,fade=seg*0.35;if(i===0&&p<=end-fade)return 1;if(i===0&&p<=end)return 1-(p-(end-fade))/fade;if(i===0)return 0;if(i===n-1&&p>=start)return Math.min(1,(p-start)/fade);if(i===n-1)return 0;if(p<start)return 0;if(p<start+fade)return(p-start)/fade;if(p<=end-fade)return 1;if(p<=end)return 1-(p-(end-fade))/fade;return 0;}
function getCurrentWatchIdx(p){return Math.min(WATCH_IMAGES.length-1,Math.floor(p*WATCH_IMAGES.length));}

function useBgProgress(){const[p,setP]=useState(0);const raf=useRef(null);useEffect(()=>{const fn=()=>{const max=document.documentElement.scrollHeight-window.innerHeight;setP(max>0?Math.max(0,Math.min(1,window.scrollY/max)):0);};const onScroll=()=>{if(raf.current)cancelAnimationFrame(raf.current);raf.current=requestAnimationFrame(fn);};window.addEventListener("scroll",onScroll,{passive:true});fn();return()=>{window.removeEventListener("scroll",onScroll);if(raf.current)cancelAnimationFrame(raf.current);};},[]);return p;}
function useInView(threshold=0.15){const ref=useRef(null);const[inView,setInView]=useState(false);useEffect(()=>{const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setInView(true);},{threshold});if(ref.current)obs.observe(ref.current);return()=>obs.disconnect();},[]);return[ref,inView];}
function useCounter(target,inView,duration=1800,decimal=false){const[val,setVal]=useState(0);useEffect(()=>{if(!inView)return;const steps=duration/16,inc=target/steps;let cur=0;const t=setInterval(()=>{cur+=inc;if(cur>=target){setVal(target);clearInterval(t);return;}setVal(decimal?Math.round(cur*10)/10:Math.floor(cur));},16);return()=>clearInterval(t);},[inView,target]);return val;}
function useBreakpoint(){const[bp,setBp]=useState("desktop");useEffect(()=>{const fn=()=>{const w=window.innerWidth;setBp(w<768?"mobile":w<1024?"tablet":"desktop");};fn();window.addEventListener("resize",fn);return()=>window.removeEventListener("resize",fn);},[]);return bp;}

// ── WATCH SHOWCASE ───────────────────────────────────────
function WatchShowcase({inView,onAccentChange,isMobile,isTablet}){
  const[idx,setIdx]=useState(0);
  const[tilt,setTilt]=useState({x:0,y:0});
  const[progress,setProgress]=useState(0);
  const[transitioning,setTransitioning]=useState(false);
  const stageRef=useRef(null);
  const timerRef=useRef(null);
  const progRef=useRef(null);
  const idxRef=useRef(0);

  const goTo=useCallback((next)=>{
    if(next===idxRef.current)return;
    setTransitioning(true);
    clearTimeout(timerRef.current);
    clearInterval(progRef.current);
    setProgress(0);
    setTimeout(()=>{
      idxRef.current=next;
      setIdx(next);
      onAccentChange&&onAccentChange(SHOWCASE[next].accent);
      setTransitioning(false);
      startProgress();
    },700);
  },[onAccentChange]);

  const startProgress=useCallback(()=>{
    clearInterval(progRef.current);
    clearTimeout(timerRef.current);
    let p=0;
    progRef.current=setInterval(()=>{
      p+=100/(5000/50);
      setProgress(Math.min(100,p));
    },50);
    timerRef.current=setTimeout(()=>{
      goTo((idxRef.current+1)%SHOWCASE.length);
    },5000);
  },[goTo]);

  useEffect(()=>{
    if(!inView)return;
    onAccentChange&&onAccentChange(SHOWCASE[0].accent);
    startProgress();
    return()=>{clearTimeout(timerRef.current);clearInterval(progRef.current);};
  },[inView]);

  const handleMouseMove=(e)=>{
    if(isMobile||!stageRef.current)return;
    const r=stageRef.current.getBoundingClientRect();
    const dx=(e.clientX-r.left-r.width/2)/(r.width/2);
    const dy=(e.clientY-r.top-r.height/2)/(r.height/2);
    setTilt({x:dy*-6,y:dx*10});
  };

  const cur=SHOWCASE[idx];

  return(
    <div style={{width:"100%",maxWidth:1200,margin:"0 auto"}}>
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":isTablet?"1fr 1fr":"2fr 3fr",gap:isMobile?0:isTablet?40:80,alignItems:"center"}}>

        {/* Info panel — left */}
        {!isMobile&&(
          <div style={{paddingLeft:isMobile?0:isTablet?0:20}}>
            <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:6,color:cur.accent,marginBottom:28,transition:"color 0.8s ease"}}>
              {cur.collection.toUpperCase()}
            </div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(44px,4.5vw,64px)",letterSpacing:4,lineHeight:0.88,color:"#fff",marginBottom:28}}>
              {cur.name.split(" ").map((w,i)=><div key={i}>{w}</div>)}
            </div>
            <div style={{width:cur.accent?48:48,height:1,background:cur.accent,marginBottom:28,transition:"background 0.8s ease"}}/>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:17,color:"rgba(255,255,255,0.45)",lineHeight:1.85,marginBottom:8}}>{cur.specs}</div>
            <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:4,color:"rgba(255,255,255,0.22)",marginBottom:56}}>REF. {cur.ref}</div>

            {/* Nav */}
            <div style={{display:"flex",alignItems:"center",gap:16}}>
              {SHOWCASE.map((_,i)=>(
                <div key={i} onClick={()=>goTo(i)} style={{cursor:"pointer",display:"flex",flexDirection:"column",gap:6}}>
                  <div style={{width:i===idx?32:8,height:1,background:i===idx?cur.accent:"rgba(255,255,255,0.25)",transition:"all 0.5s ease"}}/>
                  <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,letterSpacing:2,color:i===idx?cur.accent:"rgba(255,255,255,0.2)",transition:"color 0.5s ease"}}>0{i+1}</div>
                </div>
              ))}
              <div style={{flex:1,height:1,background:"rgba(255,255,255,0.08)",position:"relative",overflow:"hidden"}}>
                <div style={{position:"absolute",left:0,top:0,bottom:0,width:`${progress}%`,background:cur.accent,transition:"background 0.8s ease"}}/>
              </div>
            </div>
          </div>
        )}

        {/* Stage — right */}
        <div ref={stageRef} onMouseMove={handleMouseMove} onMouseLeave={()=>setTilt({x:0,y:0})}
          style={{position:"relative",perspective:"1400px",display:"flex",justifyContent:"center",alignItems:"center",minHeight:isMobile?340:560}}>

          {/* Ambient floor glow */}
          <div style={{position:"absolute",bottom:"8%",left:"50%",transform:"translateX(-50%)",width:"55%",height:48,borderRadius:"50%",
            background:cur.accent,filter:"blur(48px)",opacity:0.28,transition:"background 0.9s ease",pointerEvents:"none"}}/>

          {/* Top rim light */}
          <div style={{position:"absolute",top:"6%",left:"50%",transform:"translateX(-50%)",width:"35%",height:1,
            background:`linear-gradient(90deg,transparent,${cur.accent},transparent)`,filter:"blur(3px)",opacity:0.45,
            transition:"background 0.9s ease",pointerEvents:"none"}}/>

          {/* Side glow left */}
          <div style={{position:"absolute",left:"5%",top:"30%",width:2,height:"40%",
            background:`linear-gradient(to bottom,transparent,${cur.accent}60,transparent)`,
            filter:"blur(8px)",opacity:0.4,transition:"background 0.9s ease",pointerEvents:"none"}}/>

          {/* 3D tilt stage */}
          <div style={{width:isMobile?"85%":"90%",maxWidth:420,height:isMobile?300:500,
            transformStyle:"preserve-3d",
            transform:`rotateX(${tilt.x}deg) rotateY(${tilt.y}deg)`,
            transition:"transform 0.14s ease-out",
            position:"relative"}}>

            {/* All 3 watches — CSS crossfade only */}
            {WATCH_IMAGES.map((src,i)=>(
              <img key={i} src={src} alt={SHOWCASE[i].name} style={{
                position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"contain",
                opacity:i===idx?(transitioning?0:1):0,
                transform:i===idx?(transitioning?"scale(0.94) translateY(-16px)":"scale(1) translateY(0)"):"scale(0.96) translateY(20px)",
                transition:"opacity 0.7s cubic-bezier(0.4,0,0.2,1),transform 0.7s cubic-bezier(0.16,1,0.3,1)",
                filter:`drop-shadow(0 24px 64px rgba(${SHOWCASE[i].accentRgb},0.45)) drop-shadow(0 4px 16px rgba(${SHOWCASE[i].accentRgb},0.25))`,
                animation:i===idx?"watchFloat 7s ease-in-out infinite":"none",
                pointerEvents:"none",
              }}/>
            ))}

            {/* Mirror reflection */}
            <img src={WATCH_IMAGES[idx]} alt="" aria-hidden="true" style={{
              position:"absolute",bottom:"-18%",left:0,width:"100%",height:"35%",
              objectFit:"contain",objectPosition:"top center",
              opacity:transitioning?0:0.07,
              transform:"scaleY(-1)",filter:"blur(6px)",
              transition:"opacity 0.7s ease",pointerEvents:"none",
            }}/>
          </div>
        </div>

        {/* Mobile info row below image */}
        {isMobile&&(
          <div style={{padding:"36px 24px 0",textAlign:"center"}}>
            <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:9,letterSpacing:6,color:cur.accent,marginBottom:14,transition:"color 0.8s ease"}}>{cur.collection.toUpperCase()}</div>
            <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:44,letterSpacing:4,lineHeight:0.9,color:"#fff",marginBottom:16}}>{cur.name}</div>
            <div style={{width:32,height:1,background:cur.accent,margin:"0 auto 16px",transition:"background 0.8s ease"}}/>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontSize:15,color:"rgba(255,255,255,0.4)",marginBottom:28}}>{cur.specs}</div>
            <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:12}}>
              {SHOWCASE.map((_,i)=>(
                <div key={i} onClick={()=>goTo(i)} style={{width:i===idx?28:7,height:1.5,borderRadius:1,
                  background:i===idx?cur.accent:"rgba(255,255,255,0.2)",cursor:"pointer",transition:"all 0.5s ease"}}/>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── STANDARD COMPONENTS ──────────────────────────────────
function Loader({onDone}){const[p,setP]=useState(0);useEffect(()=>{const t1=setTimeout(()=>setP(1),300),t2=setTimeout(()=>setP(2),1200),t3=setTimeout(()=>setP(3),2200),t4=setTimeout(()=>onDone(),2800);return()=>[t1,t2,t3,t4].forEach(clearTimeout);},[]);return(<div style={{position:"fixed",inset:0,zIndex:9999,background:BG,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:p===3?0:1,transition:p===3?"opacity 0.7s ease":"none",pointerEvents:p===3?"none":"all"}}><div style={{width:1,height:p>=1?88:0,background:`linear-gradient(to bottom,transparent,${G})`,transition:"height 0.9s cubic-bezier(0.16,1,0.3,1)",marginBottom:36}}/><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:88,letterSpacing:30,background:`linear-gradient(135deg,#fff 0%,${GL} 50%,#fff 100%)`,backgroundSize:"300% 100%",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",opacity:p>=1?1:0,transform:p>=1?"translateY(0)":"translateY(20px)",transition:"opacity 0.8s ease 0.2s,transform 0.8s cubic-bezier(0.16,1,0.3,1) 0.2s",animation:p>=1?"goldShimmer 3s ease infinite":"none"}}>LUXX</div><div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:300,fontSize:10,letterSpacing:7,color:"rgba(255,255,255,0.35)",marginTop:14,opacity:p>=2?1:0,transition:"opacity 0.6s ease"}}>FINE JEWELRY</div><div style={{width:1,height:p>=2?88:0,background:`linear-gradient(to bottom,${G},transparent)`,transition:"height 0.9s cubic-bezier(0.16,1,0.3,1)",marginTop:36}}/></div>);}
function Grain(){return <div style={{position:"fixed",inset:0,zIndex:997,pointerEvents:"none",opacity:0.04,backgroundImage:`url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")`,backgroundRepeat:"repeat",backgroundSize:"200px 200px"}}/>;}
function FadeUp({children,inView,delay=0,y=36}){return <div style={{opacity:inView?1:0,transform:inView?"translateY(0)":`translateY(${y}px)`,transition:`opacity 0.9s ease ${delay}s,transform 0.9s cubic-bezier(0.16,1,0.3,1) ${delay}s`}}>{children}</div>;}
function SlideUp({children,inView,delay=0}){return <div style={{overflow:"hidden"}}><div style={{transform:inView?"translateY(0)":"translateY(105%)",transition:`transform 1s cubic-bezier(0.16,1,0.3,1) ${delay}s`}}>{children}</div></div>;}
function StatCard({num,suffix,label,inView,decimal,accent}){const c=useCounter(num,inView,1800,decimal);return(<div style={{textAlign:"center"}}><div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"clamp(52px,5.5vw,76px)",letterSpacing:4,lineHeight:1,background:`linear-gradient(135deg,${accent} 0%,${GL} 60%,${accent} 100%)`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",transition:"background 0.8s ease"}}>{decimal?c.toFixed(1):c}{suffix}</div><div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:300,fontSize:9,letterSpacing:4,color:"rgba(255,255,255,0.38)",marginTop:10,textTransform:"uppercase"}}>{label}</div></div>);}

function WatchIndicator({bgProgress,accent,isMobile}){
  const idx=getCurrentWatchIdx(bgProgress);
  return(<div style={{position:"fixed",bottom:isMobile?16:40,right:isMobile?12:48,zIndex:100,textAlign:"right",pointerEvents:"none"}}>
    <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:8,marginBottom:16}}>
      {WATCH_IMAGES.map((_,i)=>{const a=i===idx,past=i<idx;return(<div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,letterSpacing:3,color:a?accent:"rgba(255,255,255,0.2)",transition:"color 0.6s ease",display:isMobile?"none":"inline"}}>{SHOWCASE[i].name}</span>
        <div style={{width:a?24:6,height:2,background:a?accent:past?`${accent}60`:"rgba(255,255,255,0.15)",borderRadius:2,transition:"all 0.5s ease"}}/>
      </div>);})}
    </div>
    <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:isMobile?18:28,letterSpacing:isMobile?2:4,color:accent,transition:"color 0.8s ease",lineHeight:1}}>{SHOWCASE[getCurrentWatchIdx(bgProgress)].time}</div>
    <div style={{fontFamily:"'Montserrat',sans-serif",fontSize:8,letterSpacing:3,color:"rgba(255,255,255,0.3)",marginTop:4}}>CURRENT PIECE</div>
  </div>);}

// ── MAIN ─────────────────────────────────────────────────
function Luxx(){
  const[loading,setLoading]=useState(true);
  const[showcaseAccent,setShowcaseAccent]=useState(G);
  const bgP=useBgProgress();
  const bp=useBreakpoint();
  const isMobile=bp==="mobile",isTablet=bp==="tablet";

  const[heroRef,heroIV]=useInView(0.05);
  const[posRef,posIV]=useInView(0.2);
  const[statsRef,statsIV]=useInView(0.3);
  const[showcaseRef,showcaseIV]=useInView(0.08);
  const[featRef,featIV]=useInView(0.1);
  const[craftRef,craftIV]=useInView(0.2);
  const[testiRef,testiIV]=useInView(0.15);
  const[ctaRef,ctaIV]=useInView(0.2);

  const A=showcaseAccent;

  return(
    <div style={{background:BG,color:"#fff",fontFamily:"'Cormorant Garamond',Georgia,serif",overflowX:"hidden"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Bebas+Neue&family=Montserrat:wght@200;300;400;500&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:2px;}
        ::-webkit-scrollbar-track{background:${BG};}
        ::-webkit-scrollbar-thumb{background:${G};}
        ::selection{background:${G}44;color:#fff;}
        a{text-decoration:none;}
        .nav-link{font-family:'Montserrat',sans-serif;font-weight:300;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,0.5);text-transform:uppercase;transition:color 0.3s;}
        .nav-link:hover{color:${G};}
        .btn-gold{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;border:1px solid ${G};color:${G};background:transparent;padding:13px 32px;cursor:pointer;transition:all 0.35s ease;}
        .btn-gold:hover{background:${G};color:#000;}
        .btn-fill{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;border:1px solid ${G};color:#000;background:${G};padding:16px 52px;cursor:pointer;transition:all 0.35s ease;}
        .btn-fill:hover{background:transparent;color:${G};}
        .feat-wrap:hover .feat-img{transform:scale(1.07);}
        .feat-img{transition:transform 0.9s cubic-bezier(0.16,1,0.3,1);}
        .testi-card{border:1px solid rgba(201,168,76,0.12);padding:40px 36px;transition:border-color 0.4s,background 0.4s;background:rgba(7,7,7,0.7);}
        .testi-card:hover{border-color:rgba(201,168,76,0.35);background:rgba(7,7,7,0.85);}
        .mat-pill{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:3px;border:1px solid rgba(201,168,76,0.3);color:rgba(255,255,255,0.45);padding:9px 18px;text-transform:uppercase;transition:all 0.3s;}
        .mat-pill:hover{border-color:${G};color:${G};}
        @keyframes goldShimmer{0%{background-position:-200% center}100%{background-position:200% center}}
        @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
        @keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}
        @keyframes ringPulse{0%,100%{border-color:rgba(201,168,76,0.08)}50%{border-color:rgba(201,168,76,0.3)}}
        @keyframes watchFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-14px)}}
        @media(max-width:767px){.btn-fill{padding:14px 28px !important;width:100%;max-width:260px;}.btn-gold{padding:12px 20px !important;width:100%;max-width:260px;}.testi-card{padding:28px 18px !important;}.mat-pill{padding:7px 11px !important;font-size:8px !important;}}
        @media(min-width:768px) and (max-width:1023px){.btn-fill{padding:15px 40px !important;}}
      `}</style>

      {loading&&<Loader onDone={()=>setLoading(false)}/>}
      <Grain/>

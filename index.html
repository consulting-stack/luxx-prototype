<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>LUXX — Hero Test</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{background:#060606;overflow-x:hidden;}

    /* ── EXACT FIND ARCHITECTURE ──────────────────────────────────── */
    /* Outer: tall scroll travel. margin-bottom pulls next section up */
    .hero-root {
      position: relative;
      height: 350vh;
      margin-bottom: -100vh;
    }
    /* Inner: sticky — stays pinned as you scroll through hero-root */
    .hero-sticky {
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    /* ── BACKGROUND (= FIND's sky) ─────────────────────────────────── */
    /* Dark warm atmosphere. Bottom warm to feel like gold emanating from the watch */
    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 160% 60% at 50% 110%, #1a1006 0%, #0a0806 45%, #060606 100%);
      z-index: 0;
    }
    /* Subtle side atmosphere */
    .hero-atmo {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 40% at 15% 70%, rgba(201,168,76,0.06) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 85% 70%, rgba(201,168,76,0.04) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    /* ── WATCH (= FIND's house) ────────────────────────────────────── */
    /* Starts at 60vh. transform-origin: center bottom — scales from base like a rising object */
    .hero-watch {
      position: absolute;
      top: 60vh;
      left: 0;
      right: 0;
      height: 80vh;
      z-index: 1;
      transform-origin: center bottom;
      will-change: transform;
    }
    .hero-watch img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center bottom;
      filter:
        drop-shadow(0 40px 80px rgba(201,168,76,0.35))
        drop-shadow(0 8px 24px rgba(201,168,76,0.2))
        drop-shadow(0 0 120px rgba(201,168,76,0.1));
    }

    /* ── MIST / SMOKE (= FIND's smoke) ─────────────────────────────── */
    /* Dark mist at base. Starts translateY(70%) — rises with scroll */
    .hero-smoke {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 45vh;
      z-index: 3;
      background: linear-gradient(to top,
        #060606 0%,
        rgba(6,6,6,0.92) 25%,
        rgba(6,6,6,0.6) 55%,
        rgba(6,6,6,0.15) 80%,
        transparent 100%
      );
      pointer-events: none;
      will-change: transform;
    }

    /* ── AMBIENT GLOW UNDER WATCH ────────────────────────────────── */
    .hero-glow {
      position: absolute;
      bottom: 18vh;
      left: 50%;
      transform: translateX(-50%);
      width: 55%;
      height: 15vh;
      background: radial-gradient(ellipse at center, rgba(201,168,76,0.14) 0%, transparent 70%);
      z-index: 2;
      border-radius: 50%;
      filter: blur(24px);
      pointer-events: none;
      will-change: opacity;
    }

    /* ── HEADLINE CONTENT ────────────────────────────────────────── */
    /* Text sits in upper viewport. Watch rises UP and covers it. */
    /* z-index: 4 — above watch initially; watch rises behind it in FIND pattern */
    /* Actually: headline has lower z-index so watch covers it */
    .hero-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-bottom: 22vh;  /* push text into upper 40% */
      z-index: 0;             /* BELOW watch — watch rises over it */
      pointer-events: none;
      will-change: opacity;
    }
    .eyebrow {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-weight: 300;
      font-size: 10px;
      letter-spacing: 7px;
      color: #C9A84C;
      margin-bottom: 24px;
      text-transform: uppercase;
    }
    .headline {
      font-family: Georgia, serif;
      font-size: clamp(64px, 14vw, 180px);
      line-height: 0.85;
      letter-spacing: 16px;
      color: #fff;
      text-align: center;
      text-shadow: 0 2px 48px rgba(0,0,0,0.8);
      margin-bottom: 20px;
    }
    .subhead {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 20px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
    }
    .subhead em { color: #C9A84C; font-style: normal; }

    /* ── LUXX LOGO OUTLINE (= FIND's outlined logo) ──────────────── */
    /* Initially opacity: 0. Fades in as watch rises to cover headline. */
    /* transparent fill so watch image shows THROUGH the letterforms */
    .hero-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      opacity: 0;
      will-change: opacity, transform;
    }
    .hero-logo svg {
      width: clamp(280px, 40vw, 560px);
      height: auto;
      overflow: visible;
    }
    .hero-logo path, .hero-logo text {
      fill: rgba(0,0,0,0);        /* transparent fill — watch shows through */
      stroke: #C9A84C;            /* gold outline */
      stroke-width: 2.5px;
    }

    /* ── SCROLL INDICATOR ────────────────────────────────────────── */
    .scroll-hint {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 5;
    }
    .scroll-line {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, #C9A84C, transparent);
      animation: pulse 2.5s ease infinite;
    }
    .scroll-label {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 8px;
      letter-spacing: 4px;
      color: rgba(255,255,255,0.28);
    }
    @keyframes pulse { 0%,100%{opacity:0.3}50%{opacity:1} }

    /* ── NEXT SECTION ──────────────────────────────────────────────── */
    .next-section {
      position: relative;
      z-index: 2;
      background: #060606;
      padding: 120px 60px;
      text-align: center;
      border-top: 1px solid rgba(201,168,76,0.15);
    }
    .next-section h2 {
      font-family: Georgia, serif;
      font-size: 56px;
      letter-spacing: 4px;
      color: #C9A84C;
      margin-bottom: 20px;
    }
    .next-section p {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 20px;
      color: rgba(255,255,255,0.4);
    }

    /* Nav */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 22px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to bottom, rgba(6,6,6,0.88), transparent);
    }
    .nav-links {
      display: flex;
      gap: 40px;
    }
    .nav-links a {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      text-transform: uppercase;
    }
    .nav-logo {
      font-family: Georgia, serif;
      font-size: 28px;
      letter-spacing: 12px;
      background: linear-gradient(135deg, #fff, #EDD98A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-cta {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 10px;
      letter-spacing: 3px;
      color: #C9A84C;
      border: 1px solid rgba(201,168,76,0.4);
      padding: 8px 20px;
      text-decoration: none;
      text-transform: uppercase;
    }
  </style>

  <!-- GSAP + ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body>

<nav>
  <div class="nav-links">
    <a href="#">Collections</a>
    <a href="#">About</a>
  </div>
  <span class="nav-logo">LUXX</span>
  <a href="#" class="nav-cta">Shop Now</a>
</nav>

<section class="hero-root">
  <div class="hero-sticky">

    <!-- Atmospheric dark background -->
    <div class="hero-bg"></div>
    <div class="hero-atmo"></div>

    <!-- Headline — upper viewport, watch rises over it -->
    <div class="hero-content">
      <p class="eyebrow">Est. 2024 &nbsp;·&nbsp; Fine Jewelry &nbsp;·&nbsp; Jackson, MS</p>
      <h1 class="headline">LUXX</h1>
      <p class="subhead">Museum quality. <em>Real-world prices.</em></p>
    </div>

    <!-- Watch — starts at 60vh, GSAP scrubs it upward + scales from bottom -->
    <div class="hero-watch" id="heroWatch">
      <img
        src="https://res.cloudinary.com/djzwhvq8s/image/upload/v1778131054/kling_20260507_%E4%BD%9C%E5%93%81_Luxury_pro_3300_1_ykilvz.jpg"
        alt="Rolex Day-Date"
      />
    </div>

    <!-- Ambient glow under watch -->
    <div class="hero-glow" id="heroGlow"></div>

    <!-- Dark mist at base — rises with scroll -->
    <div class="hero-smoke" id="heroSmoke"></div>

    <!-- LUXX outlined logo — fades in as watch covers headline -->
    <!-- transparent fill lets watch image show through letterforms -->
    <div class="hero-logo" id="heroLogo">
      <svg viewBox="0 0 560 120" xmlns="http://www.w3.org/2000/svg">
        <text
          x="50%"
          y="100"
          text-anchor="middle"
          font-family="Georgia, serif"
          font-size="120"
          letter-spacing="16"
          fill="rgba(0,0,0,0)"
          stroke="#C9A84C"
          stroke-width="2"
        >LUXX</text>
      </svg>
    </div>

    <!-- Scroll cue -->
    <div class="scroll-hint" id="scrollHint">
      <div class="scroll-line"></div>
      <span class="scroll-label">SCROLL</span>
    </div>

  </div>
</section>

<!-- Next section — pulled up by margin-bottom: -100vh on hero-root -->
<section class="next-section">
  <h2>THE COLLECTION</h2>
  <p>Affordable elegance isn't a compromise.</p>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

const root    = document.querySelector('.hero-root');
const watch   = document.getElementById('heroWatch');
const smoke   = document.getElementById('heroSmoke');
const glow    = document.getElementById('heroGlow');
const logo    = document.getElementById('heroLogo');
const content = document.querySelector('.hero-content');
const hint    = document.getElementById('scrollHint');

// Smoke starts translated down (hidden), like FIND: translateY(70%)
gsap.set(smoke, { yPercent: 70 });
// Logo starts invisible
gsap.set(logo, { opacity: 0, scale: 0.94 });

const tl = gsap.timeline({
  scrollTrigger: {
    trigger: root,
    start: 'top top',
    end: 'bottom bottom',
    scrub: true,
  }
});

// ── PHASE 1 (0→40%): Watch rises from 60vh, scale grows from bottom ──
// Mirrors FIND's house animation. At 40% progress watch covers the headline.
tl.to(watch, {
  yPercent: -55,      // rise upward ~55% of its own height
  scale: 1.45,        // scale up from transform-origin: center bottom
  ease: 'none',
}, 0);

// Smoke rises simultaneously
tl.to(smoke, {
  yPercent: 0,        // from 70% down to 0 (fully visible)
  ease: 'none',
}, 0);

// Glow intensifies as watch rises
tl.to(glow, {
  opacity: 1.6,
  ease: 'none',
}, 0);

// Headline fades as watch covers it (early phase)
tl.to(content, {
  opacity: 0,
  ease: 'power1.in',
}, 0);

// Scroll hint fades out
tl.to(hint, {
  opacity: 0,
  ease: 'none',
}, 0);

// ── PHASE 2 (30→65%): LUXX outlined logo fades in ────────────────────
// Watch is now covering the headline. Logo letterforms reveal,
// watch image shows through transparent letter fills.
tl.to(logo, {
  opacity: 1,
  scale: 1,
  ease: 'power1.out',
}, 0.3);

// ── PHASE 3 (65→100%): Watch continues rising, logo stays ───────────
// Watch eventually recedes above. Logo is the centerpiece.
tl.to(watch, {
  yPercent: -90,
  scale: 1.7,
  ease: 'none',
}, 0.65);

tl.to(logo, {
  opacity: 0.85,
  ease: 'none',
}, 0.65);

// Entrance animation — content fades in on load
gsap.fromTo(content,
  { opacity: 0, y: 20 },
  { opacity: 1, y: 0, duration: 1.2, delay: 0.3, ease: 'power2.out' }
);
gsap.fromTo(hint,
  { opacity: 0 },
  { opacity: 1, duration: 1, delay: 1.8, ease: 'power2.out' }
);
</script>

</body>
</html>
